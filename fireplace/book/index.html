<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>The Book — Fireplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=IM+Fell+English:ital@0;1&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Spectral:ital,wght@0,400;0,500;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Hidden text input - captures keystrokes (incl. IME / mobile keyboards) -->
<textarea id="hidden-input" autocapitalize="off" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>

<!-- The viewport holds the scaled stage -->
<div id="viewport">

  <!-- Camera applies zoom + pan -->
  <div id="camera">
    <!-- Stage is fixed at 2730×1535 (image native resolution) -->
    <div id="stage">

      <!-- The reference photograph: wood table + open book -->
      <img id="scene" src="assets/book-table.jpg" alt="" draggable="false">

      <!-- Candlelight glow on the pages -->
      <div class="candlelight"></div>

      <!-- The book overlay - positioned over the pages of the photograph -->
      <div id="book">

        <!-- Paper warp wrapper: SVG filter applied to text -->
        <div id="paper" class="paper-warp">
          <!-- Two real pages with CSS 3D perspective. Each page tilts back
               at its inner (spine) edge so the geometry matches the photo's
               spine fold instead of the old broken cylinder filter. -->
          <div class="spread" id="spread">
            <div class="page page-left">
              <div class="page-inner" id="page-left-inner" data-page="left"></div>
            </div>
            <div class="page page-right">
              <div class="page-inner" id="page-right-inner" data-page="right"></div>
            </div>
          </div>
        </div>

        <!-- (Decorative spine + page-curve shadow overlays removed — they
             introduced a visible darker rectangle that didn't match the
             photograph's own shadows. The photo provides the real shadows.) -->

        <!-- The quill IS the cursor. The nib pixel of the SVG is positioned
             exactly at the next-write point on the page (set by JS). The
             whole quill rotates ~28° clockwise so the feather extends up
             and to the right, away from already-written text. -->
        <div id="caret" aria-hidden="true">
          <svg id="quill-svg" viewBox="0 0 120 320" preserveAspectRatio="xMidYMid meet">
            <!-- shaft -->
            <path d="M 64 312 C 62 240 58 170 50 100 C 46 60 38 30 24 8"
                  fill="none" stroke="#2a1a0e" stroke-width="2" stroke-linecap="round"/>
            <!-- feather body -->
            <path d="M 24 8
                     C 6 38 4 88 12 138
                     C 18 178 32 218 56 248
                     C 60 220 60 180 56 138
                     C 52 96 44 50 24 8 Z"
                  fill="#5c4128" opacity="0.92"/>
            <!-- inner highlights / barbs -->
            <g stroke="#3a2814" stroke-width="0.7" fill="none" opacity="0.75">
              <path d="M 24 14 L 16 26"/><path d="M 24 26 L 12 42"/>
              <path d="M 26 40 L 11 60"/><path d="M 28 56 L 10 80"/>
              <path d="M 30 74 L 11 102"/><path d="M 32 92 L 13 124"/>
              <path d="M 36 112 L 18 146"/><path d="M 40 132 L 22 168"/>
              <path d="M 44 152 L 26 190"/><path d="M 48 174 L 32 210"/>
              <path d="M 52 196 L 40 230"/>
              <path d="M 28 14 L 38 24"/><path d="M 30 28 L 42 40"/>
              <path d="M 32 44 L 46 58"/><path d="M 34 62 L 48 76"/>
              <path d="M 36 80 L 50 96"/><path d="M 38 100 L 52 118"/>
              <path d="M 42 122 L 56 140"/><path d="M 46 144 L 58 162"/>
              <path d="M 50 168 L 60 184"/>
            </g>
            <!-- central rachis highlight -->
            <path d="M 24 12 C 36 60 48 130 56 240"
                  fill="none" stroke="#c9a06a" stroke-width="0.8" opacity="0.55"/>
            <!-- inky tip - the point at (64, 312) is the "nib" anchor -->
            <path d="M 62 296 L 70 312 L 64 320 L 58 304 Z" fill="#0d0604"/>
            <ellipse cx="64" cy="312" rx="1.8" ry="2.4" fill="#1a0a04"/>
          </svg>
        </div>

        <!-- Subtle date / page marker in the upper outer corners -->
        <div class="folio folio-left">
          <div class="folio-date">19 · v · ’26</div>
        </div>
        <div class="folio folio-right">
          <div class="folio-num">ii</div>
        </div>

        <!-- "Begin writing" hint, fades out on first keystroke -->
        <div class="hint" id="hint">
          <em>begin where the candlelight finds you…</em>
        </div>
      </div><!-- /book -->

    </div><!-- /stage -->
  </div><!-- /camera -->

  <!-- ─────── CHROME ─────── -->

  <!-- Top: notebook title + page nav -->
  <header class="chrome top-chrome">
    <button class="icon-btn ghost" id="btn-home" title="Library">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
        <path d="M4 4h6v16H4zM14 4h6v16h-6z"/>
      </svg>
    </button>
    <div class="title-block">
      <div class="title-eyebrow">Fireplace · The Book</div>
      <div class="title-main">Commonplace, vol. iii</div>
    </div>
    <div class="page-nav">
      <button class="icon-btn ghost" id="btn-prev" title="Previous spread">‹</button>
      <span class="page-indicator">spread <b>4</b> of 32</span>
      <button class="icon-btn ghost" id="btn-next" title="Next spread">›</button>
    </div>
  </header>

  <!-- Bottom: zoom + tools -->
  <footer class="chrome bottom-chrome">
    <div class="tool-cluster">
      <button class="icon-btn" id="btn-sample" title="Play a sample passage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <span>demo</span>
      </button>
      <button class="icon-btn" id="btn-clear" title="Clear the page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M7 7l1 12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-12"/></svg>
        <span>clear</span>
      </button>
    </div>

    <div class="zoom-cluster">
      <button class="icon-btn ghost" id="btn-zoom-out" title="Zoom out">−</button>
      <button class="zoom-readout" id="btn-zoom-reset" title="Reset view">
        <span id="zoom-value">100%</span>
      </button>
      <button class="icon-btn ghost" id="btn-zoom-in" title="Zoom in">+</button>
    </div>

    <div class="tool-cluster right">
      <span class="status-dot"></span>
      <span class="status-text" id="status-text">saved · just now</span>
      <button class="icon-btn ghost" id="btn-tweaks" title="Tweaks">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="3"/><path d="M19 12c0 .4-.04.8-.1 1.2l2 1.6-2 3.4-2.4-.9c-.6.5-1.3.9-2 1.2l-.4 2.5h-4l-.4-2.5c-.7-.3-1.4-.7-2-1.2l-2.4.9-2-3.4 2-1.6c-.06-.4-.1-.8-.1-1.2s.04-.8.1-1.2l-2-1.6 2-3.4 2.4.9c.6-.5 1.3-.9 2-1.2L10 3h4l.4 2.5c.7.3 1.4.7 2 1.2l2.4-.9 2 3.4-2 1.6c.06.4.1.8.1 1.2z"/></svg>
      </button>
    </div>
  </footer>

  <!-- Hint chip showing pan/zoom shortcuts -->
  <div class="shortcut-chip" id="shortcut-chip">
    <kbd>⌥</kbd>+drag to pan · <kbd>⌘</kbd>+scroll to zoom · or pinch
  </div>

</div><!-- /viewport -->

<!-- Tweaks panel -->
<aside id="tweaks-panel" hidden></aside>

<!-- SVG filter defs -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <!-- paper-warp: fine turbulence on the page surface for hand-laid-paper
         irregularity. Applied to .page-inner so it sits inside the 3D-rotated
         .page wrapper without flattening the perspective context. -->
    <filter id="paper-warp" x="-2%" y="-2%" width="104%" height="104%">
      <feTurbulence type="fractalNoise" baseFrequency="0.022" numOctaves="2" seed="7" result="turb"/>
      <feDisplacementMap in="SourceGraphic" in2="turb" scale="3.5" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <!-- ink-bleed: tiny gaussian blur (wet ink) -->
    <filter id="ink-bleed">
      <feGaussianBlur stdDeviation="0.35"/>
    </filter>
  </defs>
</svg>

<script src="editor.js"></script>
<script src="tweaks.js"></script>
</body>
</html>

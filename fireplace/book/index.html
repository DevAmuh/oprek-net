<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>The Book — Fireplace</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<!-- Cormorant Garamond — readable italic serif (default hand).
     Italianno — flowing script (the dramatic toggle hand).
     Inter — chrome UI only. -->
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=Italianno&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<!-- opentype.js: per-glyph SVG path data for the ink-trace animation.
     If it fails to load (offline / CSP / CDN down), the editor simply
     skips the trace overlay — the typed glyph still appears normally. -->
<script src="https://cdn.jsdelivr.net/npm/opentype.js@1.3.4/dist/opentype.min.js"></script>
</head>
<body>

<!-- The viewport holds the scaled stage -->
<div id="viewport">

  <!-- Camera applies zoom + pan -->
  <div id="camera">
    <!-- Stage is fixed at 2730×1535 (the photo's native resolution) -->
    <div id="stage">

      <!-- The reference photograph: wood table + open book -->
      <img id="scene" src="assets/book-table.jpg" alt="" draggable="false">

      <!-- Warm candlelight glow on the pages -->
      <div class="candlelight"></div>

      <!-- The book overlay — positioned over the pages of the photograph -->
      <div id="book">

        <!-- THE WRITING SURFACE. This contenteditable IS the page. The
             SVG page-warp filter (paper texture + spine curve) is applied
             here in phase B. -->
        <div id="text-flow" class="text-flow" contenteditable="true"
             spellcheck="false" autocapitalize="off" autocorrect="off"><p><br></p></div>

        <!-- The quill IS the cursor. Sibling of #text-flow (kept outside
             the SVG filter so the quill itself isn't warped). JS positions
             it at the native caret. Hidden until phase C wires it up. -->
        <div id="quill-caret" aria-hidden="true">
          <svg id="quill-svg" viewBox="0 0 120 320" preserveAspectRatio="xMidYMid meet">
            <!-- shaft -->
            <path d="M 64 312 C 62 240 58 170 50 100 C 46 60 38 30 24 8"
                  fill="none" stroke="#2a1a0e" stroke-width="2" stroke-linecap="round"/>
            <!-- feather body -->
            <path d="M 24 8
                     C 6 38 4 88 12 138
                     C 18 178 32 218 56 248
                     C 60 220 60 180 56 138
                     C 52 96 44 50 24 8 Z"
                  fill="#5c4128" opacity="0.92"/>
            <!-- inner highlights / barbs -->
            <g stroke="#3a2814" stroke-width="0.7" fill="none" opacity="0.75">
              <path d="M 24 14 L 16 26"/><path d="M 24 26 L 12 42"/>
              <path d="M 26 40 L 11 60"/><path d="M 28 56 L 10 80"/>
              <path d="M 30 74 L 11 102"/><path d="M 32 92 L 13 124"/>
              <path d="M 36 112 L 18 146"/><path d="M 40 132 L 22 168"/>
              <path d="M 44 152 L 26 190"/><path d="M 48 174 L 32 210"/>
              <path d="M 52 196 L 40 230"/>
              <path d="M 28 14 L 38 24"/><path d="M 30 28 L 42 40"/>
              <path d="M 32 44 L 46 58"/><path d="M 34 62 L 48 76"/>
              <path d="M 36 80 L 50 96"/><path d="M 38 100 L 52 118"/>
              <path d="M 42 122 L 56 140"/><path d="M 46 144 L 58 162"/>
              <path d="M 50 168 L 60 184"/>
            </g>
            <!-- central rachis highlight -->
            <path d="M 24 12 C 36 60 48 130 56 240"
                  fill="none" stroke="#c9a06a" stroke-width="0.8" opacity="0.55"/>
            <!-- inky tip — the point at (64, 312) is the "nib" anchor -->
            <path d="M 62 296 L 70 312 L 64 320 L 58 304 Z" fill="#0d0604"/>
            <ellipse cx="64" cy="312" rx="1.8" ry="2.4" fill="#1a0a04"/>
          </svg>
        </div>

        <!-- "Begin writing" hint, fades out on first keystroke -->
        <div class="hint" id="hint">
          <em>begin where the candlelight finds you…</em>
        </div>

      </div><!-- /book -->

    </div><!-- /stage -->
  </div><!-- /camera -->

  <!-- ─────── CHROME ─────── -->

  <header class="chrome top-chrome">
    <div class="title-block">
      <div class="title-eyebrow">Fireplace · The Book</div>
      <div class="title-main">Commonplace, vol. iii</div>
    </div>
  </header>

  <footer class="chrome bottom-chrome">
    <div class="tool-cluster">
      <button class="icon-btn" id="btn-clear" title="Clear the page">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M6 7h12M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2M7 7l1 12a2 2 0 0 0 2 2h4a2 2 0 0 0 2-2l1-12"/></svg>
        <span>clear</span>
      </button>
    </div>

    <div class="zoom-cluster">
      <button class="icon-btn ghost" id="btn-zoom-out" title="Zoom out">−</button>
      <button class="zoom-readout" id="btn-zoom-reset" title="Reset view">
        <span id="zoom-value">100%</span>
      </button>
      <button class="icon-btn ghost" id="btn-zoom-in" title="Zoom in">+</button>
    </div>

    <div class="tool-cluster right">
      <span class="status-dot"></span>
      <span class="status-text" id="status-text">unsaved</span>
      <button class="icon-btn ghost" id="btn-font" title="Switch hand">
        <span style="font-family:'Cormorant Garamond',serif; font-style:italic; font-size:16px;">Aa</span>
      </button>
    </div>
  </footer>

  <!-- Hint chip showing pan/zoom shortcuts -->
  <div class="shortcut-chip" id="shortcut-chip">
    <kbd>⌥</kbd>+drag to pan · <kbd>⌘</kbd>+scroll to zoom · or pinch
  </div>

</div><!-- /viewport -->

<!-- Hidden host: SVG filter defs + the ink-trace overlay layer.
     Sits in the top layer (viewport-fixed) so ink-trace SVGs can be
     positioned in screen space without DOM-ownership conflicts. -->
<div id="hidden-host" aria-hidden="true">
  <svg width="0" height="0">
    <defs>
      <!-- page-warp: the brief's feTurbulence + feDisplacementMap approach.
           Stage 1 — fine fractal-noise turbulence warps the text pixels a
           hair, for hand-laid-paper irregularity.
           Stage 2 — a generated cosine displacement map (#spine-map, its
           href is set by editor.js) dips each line gently toward the spine.
           Applied to .text-flow via the .warp-on class once the map is
           ready, so a generation failure can't make text vanish. -->
      <filter id="page-warp" x="-3%" y="-3%" width="106%" height="106%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="2"
                      seed="7" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="4"
                           xChannelSelector="R" yChannelSelector="G" result="paperWarped"/>
        <feImage id="spine-map" x="0%" y="0%" width="100%" height="100%"
                 preserveAspectRatio="none" result="spineMap"/>
        <feDisplacementMap in="paperWarped" in2="spineMap" scale="22"
                           xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>
</div>

<script src="editor.js"></script>
<script src="tweaks.js"></script>
</body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Wegweiser — language-learning command centre</title>
    <!-- Kept under ~160 chars: Google truncates past that, and a description
         that gets cut off mid-sentence is worse than a shorter complete one.
         og:description below is longer because WhatsApp/Slack show more. -->
    <meta
      name="description"
      content="German to Goethe B1 and Japanese to JLPT N4 in parallel: a 157-node prerequisite skill tree, a 20-second daily log, and a pace simulator tied to real exam dates."
    />
    <!-- The site force-redirects every request to the www host, so every
         absolute URL below uses www too. A crawler that has to chase a 307 to
         fetch og:image simply drops the preview image — which is exactly what
         broke the WhatsApp card. -->
    <link rel="canonical" href="https://www.dhiya.id/wegweiser/" />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Amuh" />
    <meta name="color-scheme" content="light" />
    <meta name="theme-color" content="#1F3864" />

    <!-- Icons. SVG for modern browsers, PNG for iOS home-screen and Android. -->
    <link rel="icon" type="image/svg+xml" href="/wegweiser/favicon.svg" />
    <link rel="apple-touch-icon" href="/wegweiser/apple-touch-icon.png" />
    <link rel="manifest" href="/wegweiser/site.webmanifest" />

    <!--
      Open Graph — the link-preview card WhatsApp, Telegram, Slack, Discord,
      Facebook and LinkedIn build when the URL is pasted. Every URL here is
      absolute on purpose: crawlers do not resolve relative paths, and the
      image must be a raster PNG because none of them render SVG previews.
    -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Wegweiser" />
    <meta property="og:url" content="https://www.dhiya.id/wegweiser/" />
    <meta property="og:title" content="Wegweiser — language-learning command centre" />
    <meta
      property="og:description"
      content="German to Goethe B1, Japanese to JLPT N4, in parallel. A prerequisite skill tree, a 20-second daily log, and a pace simulator that shows what any pace buys you against real exam dates."
    />
    <meta property="og:image" content="https://www.dhiya.id/wegweiser/og.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="Wegweiser: a personal language-learning command centre for German to Goethe B1 and Japanese to JLPT N4."
    />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter/X reads its own namespace and ignores og:* for card type. -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Wegweiser — language-learning command centre" />
    <meta
      name="twitter:description"
      content="German to Goethe B1, Japanese to JLPT N4, in parallel. A skill tree, a daily log, and a pace simulator measured against real exam dates."
    />
    <meta name="twitter:image" content="https://www.dhiya.id/wegweiser/og.png" />
    <meta
      name="twitter:image:alt"
      content="Wegweiser: a personal language-learning command centre for German and Japanese."
    />

    <link rel="modulepreload" crossorigin href="/wegweiser/assets/rolldown-runtime-QTnfLwEv.js">
    <link rel="modulepreload" crossorigin href="/wegweiser/assets/charts-CFwYtISH.js">
    <link rel="stylesheet" crossorigin href="/wegweiser/assets/index-NLgPJO0t.css">
  </head>

  </body>
</html>

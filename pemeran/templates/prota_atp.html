<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Program Tahunan &amp; Alur Tujuan Pembelajaran</title>
<style>
  /* Structure verified against the school's real docx (Prota - ESP - Grade 7
     - TA 2025-2026.docx): header block (SATUAN PENDIDIKAN/MATA PELAJARAN/
     TAHUN PELAJARAN/FASE-KELAS/SEMESTER), CP-per-elemen table, then
     "Alur Tujuan Pembelajaran (ATP) Semester 1/2" sections with per-unit
     tables (Kode | Rumusan TP | Kompetensi | Konten | JP) + sumatif rows +
     Total rows, signature block. */
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; background: #e8e8e8; font-family: 'Arial Narrow', Arial, 'Segoe UI', sans-serif; }
  .prota-page {
    width: 210mm; min-height: 297mm; margin: 12px auto; padding: 14mm 12.7mm;
    background: #fff; color: #000; box-shadow: 0 0 8px rgba(0,0,0,0.25);
    font-size: 10pt; line-height: 1.35;
  }
  .title-block { text-align: center; margin-bottom: 10px; }
  .title-block h1 { font-size: 13pt; margin: 0; }
  .header-block { margin-bottom: 10px; font-size: 10pt; }
  .header-row { display: flex; gap: 4px; }
  .header-row .label { font-weight: bold; width: 170px; flex-shrink: 0; }

  table.doc-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
  table.doc-table th, table.doc-table td { border: 1px solid #000; padding: 4px 6px; vertical-align: top; font-size: 9.5pt; }
  table.doc-table th { background: #F7CBAC; font-weight: bold; text-align: center; }
  table.doc-table td.center { text-align: center; }

  h2.section-title { font-size: 11pt; margin: 14px 0 6px; text-decoration: underline; }
  .cp-band td { background: #FFCE3C; font-weight: bold; }
  .sumatif-band td { background: #FFCE3C; font-weight: bold; text-align: center; }
  .total-band td { background: #F4B083; font-weight: bold; text-align: center; }
  .semester-total-band td { background: #F4B083; font-weight: bold; text-align: center; font-size: 10.5pt; }

  .signature-block { display: flex; justify-content: space-between; margin-top: 16px; }
  .signature-block p { margin: 2px 0; }

  @media print {
    html, body { background: #fff; }
    .prota-page { margin: 0; box-shadow: none; width: auto; min-height: 0; }
    @page { size: A4; margin: 12.7mm; }
  }
</style>
</head>
<body>
<div class="prota-page">

  <div class="title-block" data-marker="0"><h1>PROGRAM TAHUNAN &amp; ALUR TUJUAN PEMBELAJARAN (ATP)</h1></div>

  <div class="header-block">
    <div class="header-row"><span class="label" data-marker="0">SATUAN PENDIDIKAN</span><span>:</span> <span data-marker="2b" data-field="school_name"></span></div>
    <div class="header-row"><span class="label" data-marker="0">MATA PELAJARAN</span><span>:</span> <span data-marker="1" data-field="subject"></span></div>
    <div class="header-row"><span class="label" data-marker="0">TAHUN PELAJARAN</span><span>:</span> <span data-marker="1" data-field="school_year"></span></div>
    <div class="header-row"><span class="label" data-marker="0">FASE/ KELAS</span><span>:</span> <span data-marker="1" data-field="fase_kelas"></span></div>
    <div class="header-row"><span class="label" data-marker="0">SEMESTER</span><span>:</span> <span data-marker="0">1 (Ganjil) &amp; 2 (Genap)</span></div>
  </div>

  <!-- CP-per-elemen table + both semesters' ATP tables are built
       programmatically by js/render/prota.js (dynamic unit/elemen counts). -->
  <div id="cp-table-mount"></div>
  <div id="atp-semester1-mount"></div>
  <div id="atp-semester2-mount"></div>

  <div class="signature-block">
    <div data-marker="0">
      <p>Mengetahui,</p>
      <p><strong>Kepala Sekolah</strong></p>
      <p>&nbsp;</p><p>&nbsp;</p>
      <p data-marker="2b" data-field="principal_name"></p>
      <p>NIK. <span data-marker="2b" data-field="principal_nik"></span></p>
    </div>
    <div data-marker="0">
      <p><span data-marker="2b" data-field="city"></span>, <span data-marker="2a" data-field="date"></span></p>
      <p><strong data-marker="0">Guru Mata Pelajaran</strong></p>
      <p>&nbsp;</p><p>&nbsp;</p>
      <p data-marker="2b" data-field="teacher_name"></p>
    </div>
  </div>

</div>
</body>
</html>

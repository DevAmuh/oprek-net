<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Labs — Mr.D</title>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='n' cx='32' cy='32' r='6' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23ffe7a3'/%3E%3Cstop offset='1' stop-color='%23ff8030'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cg fill='none' stroke='%2380c8ff' stroke-width='2' opacity='0.9'%3E%3Cellipse cx='32' cy='32' rx='26' ry='10'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='10' transform='rotate(60 32 32)'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='10' transform='rotate(-60 32 32)'/%3E%3C/g%3E%3Ccircle cx='32' cy='32' r='5' fill='url(%23n)'/%3E%3C/svg%3E"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 100%; min-height: 100%;
    background: #06070a;
    color: rgba(244,243,239,0.85);
    font-family: 'Georgia', 'Times New Roman', serif;
    overflow-x: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(1px 1px at 15% 22%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 72% 8%,  rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 88% 55%, rgba(255,255,255,0.30) 0%, transparent 100%),
      radial-gradient(1px 1px at 34% 78%, rgba(255,255,255,0.20) 0%, transparent 100%),
      radial-gradient(1px 1px at 60% 40%, rgba(255,255,255,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 5%  90%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 95% 85%, rgba(255,255,255,0.20) 0%, transparent 100%),
      radial-gradient(1px 1px at 48% 60%, rgba(255,255,255,0.18) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 25% 50%, rgba(180,220,255,0.25) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 80% 30%, rgba(180,220,255,0.20) 0%, transparent 100%);
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: relative;
    z-index: 10;
    padding: clamp(48px, 8vw, 80px) clamp(24px, 6vw, 80px) clamp(24px, 4vw, 40px);
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .header-left h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: normal;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: rgba(244,243,239,0.92);
  }

  .header-left p {
    margin-top: 8px;
    font-size: clamp(11px, 1.4vw, 14px);
    font-style: italic;
    color: rgba(255,255,255,0.38);
    letter-spacing: 0.04em;
    line-height: 1.6;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-bottom: 4px;
  }

  .back-link {
    font-size: clamp(10px, 1.2vw, 13px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.35);
    text-decoration: none;
    transition: color 0.25s ease;
    white-space: nowrap;
  }
  .back-link:hover { color: rgba(255,255,255,0.72); }

  /* Lock button — subtle, tucked in header */
  #lock-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    padding: 6px 10px;
    cursor: pointer;
    color: rgba(255,255,255,0.28);
    font-size: 13px;
    line-height: 1;
    transition: color 0.2s ease, border-color 0.2s ease;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  #lock-btn:hover { color: rgba(255,255,255,0.65); border-color: rgba(255,255,255,0.25); }
  #lock-btn.unlocked { color: rgba(160,220,160,0.6); border-color: rgba(160,220,160,0.25); }
  #lock-btn svg { width: 13px; height: 13px; fill: currentColor; }

  /* Sign out notice */
  #signout-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-family: 'Georgia', serif;
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    padding: 0;
    transition: color 0.2s ease;
  }
  #signout-btn:hover { color: rgba(255,120,100,0.7); }

  main {
    position: relative;
    z-index: 10;
    padding: clamp(32px, 5vw, 60px) clamp(24px, 6vw, 80px) clamp(48px, 8vw, 100px);
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(min(320px, 100%), 1fr));
    gap: clamp(20px, 3vw, 36px);
  }

  .card {
    display: flex;
    flex-direction: column;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 6px;
    overflow: hidden;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    transition: border-color 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;
    will-change: transform;
  }
  .card:hover {
    border-color: rgba(255,255,255,0.22);
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.04);
  }

  .thumb {
    position: relative;
    width: 100%;
    aspect-ratio: 16 / 9;
    overflow: hidden;
    background: #0a0b10;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }

  .thumb iframe {
    position: absolute;
    top: 0; left: 0;
    width: 1280px;
    height: 720px;
    transform-origin: top left;
    border: none;
    pointer-events: none;
  }

  .thumb::after {
    content: '';
    position: absolute;
    inset: 0;
    background: rgba(255,255,255,0);
    transition: background 0.3s ease;
  }
  .card:hover .thumb::after { background: rgba(255,255,255,0.03); }

  .card-body {
    padding: clamp(16px, 2.5vw, 24px);
    display: flex;
    flex-direction: column;
    gap: 8px;
    flex: 1;
  }

  .card-title {
    font-size: clamp(13px, 1.6vw, 17px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: rgba(244,243,239,0.88);
  }

  .card-desc {
    font-size: clamp(11px, 1.2vw, 13px);
    font-style: italic;
    color: rgba(255,255,255,0.42);
    line-height: 1.65;
    letter-spacing: 0.015em;
  }

  .card-arrow {
    margin-top: auto;
    padding-top: 14px;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    transition: color 0.25s ease;
  }
  .card:hover .card-arrow { color: rgba(255,255,255,0.55); }

  .count {
    font-size: clamp(10px, 1.1vw, 12px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.22);
    margin-bottom: clamp(20px, 3vw, 32px);
  }

  /* Hidden cards animate in */
  .card.reveal {
    animation: card-in 0.4s ease forwards;
    opacity: 0;
  }
  @keyframes card-in {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <h1>Labs</h1>
    <p>Things built with Claude, one experiment at a time.</p>
  </div>
  <div class="header-right">
    <button id="signout-btn" style="display:none">Sign out</button>
    <button id="lock-btn" title="Admin access">
      <!-- locked icon -->
      <svg id="icon-locked" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zm3.1-9H8.9V6a3.1 3.1 0 0 1 6.2 0v2z"/></svg>
      <!-- unlocked icon (hidden by default) -->
      <svg id="icon-unlocked" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none"><path d="M18 8h-1V6A5 5 0 0 0 7 6v2H6a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V10a2 2 0 0 0-2-2zm-6 9a2 2 0 1 1 0-4 2 2 0 0 1 0 4zM8.9 8V6a3.1 3.1 0 0 1 6.2 0v2H8.9z" opacity="0.4"/><path d="M18 8H8.9V6a3.1 3.1 0 0 1 5.4-2.1" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>
    </button>
    <a href="/" class="back-link">&#8592; Home</a>
  </div>
</header>

<main>
  <p class="count" id="count"></p>
  <div class="grid" id="grid"></div>
</main>

<script>
  const SUPABASE_URL = 'https://pvgsrurcxssjqxshqkli.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_oDZbTs1Ssm92kTIqqzwqWQ_-31YHKOU';
  const { createClient } = supabase;
  const db = createClient(SUPABASE_URL, SUPABASE_KEY);

  // Public projects — always visible
  const PUBLIC = [
    {
      title: "Expanse of The Universe",
      desc: "An immersive 3D starfield with drifting particles, orbital mechanics, and rotating quotes — a living canvas for contemplation.",
      href: "/",
    },
    {
      title: "Fireplace",
      desc: "A private dashboard for notes, ideas, and blog posts. Built around warmth and focus, gated to a single owner.",
      href: "/fireplace/",
    },
    {
      title: "Sound Memory Game",
      desc: "A memory game where you listen and repeat. Built for a campus project at Unindra.",
      href: "/unindra/smg/",
    },
  ];

  // Admin-only projects — data never touches the DOM until authenticated
  const PRIVATE = [
    {
      title: "Graduation Seat Finder",
      desc: "Interactive seating chart for a graduation ceremony — find your seat and your family's seat in seconds.",
      href: "/graduation/",
    },
  ];

  const OWNER_EMAIL = 'amuhsejati@gmail.com';
  const IDLE_MS = 60 * 1000; // 1 minute of inactivity → auto sign-out
  const ACTIVITY_KEY = 'lab_last_activity';

  const grid       = document.getElementById('grid');
  const countEl    = document.getElementById('count');
  const lockBtn    = document.getElementById('lock-btn');
  const signoutBtn = document.getElementById('signout-btn');
  const iconLocked   = document.getElementById('icon-locked');
  const iconUnlocked = document.getElementById('icon-unlocked');

  let isAdmin = false;

  function buildCard(p, animate) {
    const a = document.createElement('a');
    a.href = p.href;
    a.className = 'card' + (animate ? ' reveal' : '');
    a.innerHTML = `
      <div class="thumb">
        <iframe src="${p.href}" scrolling="no" tabindex="-1"
          sandbox="allow-scripts allow-same-origin"
          loading="lazy"></iframe>
      </div>
      <div class="card-body">
        <div class="card-title">${p.title}</div>
        <div class="card-desc">${p.desc}</div>
        <div class="card-arrow">Visit &rarr;</div>
      </div>`;
    return a;
  }

  function updateCount() {
    const n = grid.querySelectorAll('.card').length;
    countEl.textContent = n + (n === 1 ? ' project' : ' projects');
  }

  function renderPublic() {
    PUBLIC.forEach(p => grid.appendChild(buildCard(p, false)));
    updateCount();
    scaleIframes();
  }

  function renderPrivate() {
    PRIVATE.forEach(p => grid.appendChild(buildCard(p, true)));
    updateCount();
    scaleIframes();
  }

  function removePrivate() {
    grid.querySelectorAll('.card.reveal').forEach(c => c.remove());
    updateCount();
  }

  function setAdminUI(on) {
    isAdmin = on;
    lockBtn.classList.toggle('unlocked', on);
    iconLocked.style.display   = on ? 'none' : '';
    iconUnlocked.style.display = on ? ''     : 'none';
    signoutBtn.style.display   = on ? ''     : 'none';
    if (on) renderPrivate(); else removePrivate();
  }

  async function signIn() {
    sessionStorage.setItem('lab_return', '1');
    bumpActivity();
    await db.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + '/' },
    });
  }

  async function signOut() {
    await db.auth.signOut();
    localStorage.removeItem(ACTIVITY_KEY);
    setAdminUI(false);
  }

  // ---- Idle tracking ----
  function bumpActivity() {
    localStorage.setItem(ACTIVITY_KEY, String(Date.now()));
  }
  function isIdle() {
    const last = parseInt(localStorage.getItem(ACTIVITY_KEY) || '0', 10);
    return last > 0 && (Date.now() - last) > IDLE_MS;
  }
  ['mousemove', 'keydown', 'click', 'touchstart', 'scroll'].forEach(evt => {
    window.addEventListener(evt, () => { if (isAdmin) bumpActivity(); }, { passive: true });
  });
  setInterval(() => {
    if (isAdmin && isIdle()) signOut();
  }, 5000);

  async function init() {
    renderPublic();

    // Catch the OAuth callback — ?code= in URL means we just returned from Google.
    // Supabase processes it async; onAuthStateChange fires when done.
    db.auth.onAuthStateChange((event, session) => {
      if (event === 'SIGNED_IN' && session && session.user.email === OWNER_EMAIL && !isAdmin) {
        bumpActivity();
        setAdminUI(true);
      } else if (event === 'SIGNED_OUT') {
        setAdminUI(false);
      }
    });

    // Also check for an existing session on normal page loads.
    const { data: { session } } = await db.auth.getSession();
    if (session && session.user.email === OWNER_EMAIL) {
      if (isIdle()) {
        await db.auth.signOut();
        localStorage.removeItem(ACTIVITY_KEY);
      } else {
        bumpActivity();
        setAdminUI(true);
      }
    }
  }

  lockBtn.addEventListener('click', () => { if (!isAdmin) signIn(); });
  signoutBtn.addEventListener('click', signOut);

  // Scale iframe thumbnails to fill their containers
  function scaleIframes() {
    document.querySelectorAll('.thumb').forEach(thumb => {
      const iframe = thumb.querySelector('iframe');
      if (!iframe) return;
      const scale = thumb.clientWidth / 1280;
      iframe.style.transform = `scale(${scale})`;
    });
  }
  window.addEventListener('resize', scaleIframes);

  init();
</script>
</body>
</html>

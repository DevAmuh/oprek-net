<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>Graduation Ceremony · 2026</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #09110d;
  --card2:   #172019;
  --gold:    #c9a84c;
  --gold-lt: #f0d080;
  --gold-dim:#7a6128;
  --green:   #2d5e38;
  --text:    #e8dfc8;
  --muted:   #6a7a62;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  background: var(--bg); color: var(--text);
  font-family: 'Nunito', sans-serif;
  display: flex; align-items: center; justify-content: center;
  text-align: center;
}
.wrap { max-width: 480px; padding: 32px; }
.cap { font-size: 46px; margin-bottom: 18px; }
.badge {
  display: inline-block;
  font-family: 'Cormorant Garamond', serif;
  font-size: 11px; letter-spacing: 3px; text-transform: uppercase;
  color: var(--gold); border: 1px solid var(--gold-dim);
  padding: 5px 14px; border-radius: 20px; margin-bottom: 20px;
}
h1 {
  font-family: 'Cormorant Garamond', serif;
  font-size: clamp(32px, 8vw, 48px);
  font-weight: 700; line-height: 1.15;
  color: var(--gold-lt); margin-bottom: 14px;
}
p.msg {
  font-family: 'Cormorant Garamond', serif;
  font-size: 18px; font-style: italic; color: var(--muted);
  line-height: 1.7; margin-bottom: 6px;
}
.foot { margin-top: 48px; font-size: 11px; color: #3a4a3c; letter-spacing: .5px; }
.foot a { color: #3a4a3c; text-decoration: none; transition: color .2s; }
.foot a:hover { color: var(--gold-dim); }
</style>
</head>
<body>
  <div class="wrap">
    <div class="cap">🎓</div>
    <div class="badge">Graduation Ceremony · 2026</div>
    <h1>Terima Kasih<br>Telah Hadir</h1>
    <p class="msg">"It meant the world to have you here with us on this day —<br>thank you for being part of this milestone. 🌸"</p>
    <div class="foot"><a href="login.html">· masuk ·</a></div>
  </div>
</body>
</html>

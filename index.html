<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Expanse of The Universe</title>
<!-- Atom favicon — three crossed orbital ellipses with a glowing nucleus.
     Inline SVG so we don't need a separate file. -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3CradialGradient id='n' cx='32' cy='32' r='6' gradientUnits='userSpaceOnUse'%3E%3Cstop offset='0' stop-color='%23ffe7a3'/%3E%3Cstop offset='1' stop-color='%23ff8030'/%3E%3C/radialGradient%3E%3C/defs%3E%3Cg fill='none' stroke='%2380c8ff' stroke-width='2' opacity='0.9'%3E%3Cellipse cx='32' cy='32' rx='26' ry='10'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='10' transform='rotate(60 32 32)'/%3E%3Cellipse cx='32' cy='32' rx='26' ry='10' transform='rotate(-60 32 32)'/%3E%3C/g%3E%3Ccircle cx='32' cy='32' r='5' fill='url(%23n)'/%3E%3C/svg%3E"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; position: fixed; inset: 0; }

  /* LOADING SCREEN — black void with a fixed wireframe sphere placed
     EXACTLY where Earth lands at default zoom (screen centre), and
     "PLEASE STAND BY" placed where the welcome text lands (top: 82%).
     This keeps visual continuity: when the loading screen fades out
     and the scene fades in, the sphere → Earth and the loading text
     → welcome text without anything jumping around the screen. */
  #loading-screen {
    position: fixed;
    inset: 0;
    background: #000;
    z-index: 1000;
    transition: opacity 1s ease;
  }
  #loading-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }
  #loading-sphere {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: clamp(140px, 22vw, 200px);
    height: clamp(140px, 22vw, 200px);
    overflow: visible;
  }
  /* Wireframe ellipses draw themselves once with stroke-dashoffset, then
     stay fixed in place — no spin (was disorienting). Staggered delays
     give the "completing from vertex to vertex" feel. */
  #wf-rotor ellipse {
    fill: none;
    stroke: rgba(255,255,255,0.85);
    stroke-width: 0.6;
    stroke-dasharray: 100;
    stroke-dashoffset: 100;
    animation: wf-draw 1.6s cubic-bezier(0.45, 0, 0.55, 1) forwards;
  }
  #wf-rotor ellipse:nth-child(1) { animation-delay: 0s;    }
  #wf-rotor ellipse:nth-child(2) { animation-delay: 0.35s; }
  #wf-rotor ellipse:nth-child(3) { animation-delay: 0.70s; }
  #loading-text {
    position: absolute;
    top: 82%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Georgia', serif;
    font-size: clamp(11px, 2vw, 15px);
    letter-spacing: 0.4em;
    color: rgba(255,255,255,0.65);
    text-transform: uppercase;
    text-align: center;
    animation: wf-text-pulse 2s ease-in-out infinite;
  }
  @keyframes wf-draw       { to   { stroke-dashoffset: 0; } }
  @keyframes wf-text-pulse {
    0%, 100% { opacity: 0.45; }
    50%      { opacity: 0.90; }
  }

  /* QUOTE — top right */
  #quote {
    position: fixed;
    top: clamp(16px, 4vw, 32px);
    right: clamp(16px, 4vw, 32px);
    z-index: 100;
    max-width: min(280px, calc(100vw - 32px));
    text-align: right;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    transform: translateY(-5px);
  }
  #quote-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: clamp(11px, 1.4vw, 14px);
    line-height: 1.65;
    color: rgba(255,255,255,0.55);
    font-style: italic;
    letter-spacing: 0.01em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85), 0 0 14px rgba(0,0,0,0.6);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #quote-author {
    margin-top: 8px;
    font-family: 'Georgia', serif;
    font-size: clamp(9px, 1.1vw, 11px);
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    transition: opacity 0.7s ease;
  }
  #quote.fade { opacity: 0; transform: translateY(-4px); }

  /* NAV — bottom left */
  #nav {
    position: fixed;
    bottom: clamp(20px, 4vw, 32px);
    left: clamp(20px, 4vw, 32px);
    z-index: 100;
  }
  #nav-toggle {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    min-height: 44px;
    color: rgba(255,255,255,0.55);
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    transition: color 0.3s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #nav-toggle:hover { color: rgba(255,255,255,0.9); }
  #nav-toggle .hamburger {
    width: 22px;
    height: 16px;
    position: relative;
    flex-shrink: 0;
  }
  #nav-toggle .hamburger span {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: currentColor;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  #nav-toggle .hamburger span:nth-child(1) { top: 0; }
  #nav-toggle .hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  #nav-toggle .hamburger span:nth-child(3) { bottom: 0; }
  #nav-toggle.open .hamburger span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
  #nav-toggle.open .hamburger span:nth-child(2) { opacity: 0; transform: translateY(-50%) scaleX(0); }
  #nav-toggle.open .hamburger span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
  #nav-toggle .nav-label {
    font-family: 'Georgia', serif;
    font-size: clamp(11px, 2.5vw, 13px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  #nav-links {
    margin-top: 12px;
    margin-left: 2px;
    padding-left: 16px;
    border-left: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.4s ease;
  }
  #nav-links.open { max-height: 160px; opacity: 1; }
  #nav-links a {
    font-family: 'Georgia', serif;
    font-size: clamp(11px, 2.5vw, 13px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    text-decoration: none;
    transition: color 0.25s, transform 0.25s;
    display: inline-block;
    padding: 4px 0;
    min-height: 44px;
    display: flex;
    align-items: center;
  }
  #nav-links a:hover { color: rgba(255,255,255,0.95); transform: translateX(5px); }

  /* AUDIO TOGGLE — top-right corner, white speaker icon. Clicking
     mutes/unmutes; muted state = 20 % opacity (we draw the fully-built
     speaker; no slash/cross because not every font/SVG renders one
     cleanly across browsers). */
  #audio-toggle {
    position: fixed;
    /* +12px compensates for #nav-links margin-top that shifts the nav up,
       so the speaker icon is vertically centred on the same line as MENU */
    bottom: calc(clamp(20px, 4vw, 32px) + 12px);
    right: clamp(20px, 4vw, 32px);
    z-index: 100;
    background: none;
    border: none;
    padding: 11px;
    cursor: pointer;
    color: rgba(255,255,255,0.8);
    min-width: 44px;
    min-height: 44px;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.5s ease, color 0.25s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
    filter: drop-shadow(0 1px 6px rgba(0,0,0,0.85));
  }
  #audio-toggle:hover { color: rgba(255,255,255,1); }
  #audio-toggle.muted { opacity: 0.20; }

  /* NOW-PLAYING — slides in from the right edge, same row as speaker */
  #now-playing {
    position: fixed;
    bottom: calc(clamp(20px, 4vw, 32px) + 12px);
    right: clamp(20px, 4vw, 32px);
    z-index: 100;
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: clamp(9px, 1.2vw, 11px);
    font-style: italic;
    letter-spacing: 0.12em;
    color: rgba(255,255,255,0.65);
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    pointer-events: none;
    user-select: none;
    white-space: nowrap;
    transform: translateX(calc(100% + clamp(20px, 4vw, 32px) + 20px));
    opacity: 0;
    transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.4s ease;
  }
  #now-playing.show {
    transform: translateX(0);
    opacity: 1;
  }

  /* WELCOME — centered horizontally, sits at the visual midpoint between
     Earth's bottom and the MENU button row. Same vertical line that the
     loading-screen text uses, so they cross-fade in place. */
  #welcome {
    position: fixed;
    top: 82%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
    font-family: 'Georgia', serif;
    font-size: clamp(11px, 2vw, 15px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    text-shadow: 0 1px 8px rgba(0,0,0,0.85), 0 0 20px rgba(0,0,0,0.5);
    pointer-events: none;
    text-align: center;
    line-height: 1.5;
    max-width: min(640px, 90vw);
    opacity: 0;
    transition: opacity 1s ease;
  }
  #welcome.visible { opacity: 1; }

  /* VERTICAL EDGE TOGGLES — sky on the right (reads bottom-to-top, CCW),
     orbits on the left (reads top-to-bottom, CW). They're geometric
     mirrors of each other across the screen's vertical center line.
     Hidden by default; revealed by clicking their ‹ / › handle. */
  #sky-toggle, #orbit-toggle {
    position: fixed;
    top: 50%;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Georgia', serif;
    font-size: clamp(10px, 2.2vw, 12px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
  }
  #sky-toggle {
    right: clamp(4px, 1.2vw, 14px);
    transform: translateY(-50%) translateX(0);
    writing-mode: sideways-lr; /* CCW: bottom-to-top */
  }
  #sky-toggle.hidden {
    transform: translateY(-50%) translateX(140%);
    opacity: 0;
    pointer-events: none;
  }
  #orbit-toggle {
    left: clamp(4px, 1.2vw, 14px);
    transform: translateY(-50%) translateX(0);
    writing-mode: sideways-rl; /* CW: top-to-bottom */
  }
  #orbit-toggle.hidden {
    transform: translateY(-50%) translateX(-140%);
    opacity: 0;
    pointer-events: none;
  }

  /* Edge HANDLES (‹ / ›) — always visible, click to slide the matching
     toggle in or out. The handle TRANSLATES inward when its toggle is
     showing, so the chevron never sits on top of the toggle's labels. */
  #sky-toggle-handle, #orbit-toggle-handle {
    position: fixed;
    top: 50%;
    z-index: 101;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.35);
    font-family: 'Georgia', serif;
    font-size: clamp(20px, 3vw, 26px);
    line-height: 1;
    padding: 14px 12px;
    min-width: 44px;
    min-height: 44px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    /* Same easing as the toggle — they slide together as a unit */
    transition: color 0.2s ease, transform 0.32s cubic-bezier(0.22, 1, 0.36, 1);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #sky-toggle-handle:hover, #orbit-toggle-handle:hover {
    color: rgba(255,255,255,0.85);
  }
  #sky-toggle-handle   {
    right: clamp(2px, 0.6vw, 8px);
    transform: translateY(-50%) translateX(0);
  }
  #sky-toggle-handle.shifted {
    /* Slide left by ~toggle width so it sits next to the toggle, not over it */
    transform: translateY(-50%) translateX(-44px);
  }
  #orbit-toggle-handle {
    left: clamp(2px, 0.6vw, 8px);
    transform: translateY(-50%) translateX(0);
  }
  #orbit-toggle-handle.shifted {
    transform: translateY(-50%) translateX(44px);
  }
  #sky-toggle .opt, #orbit-toggle .opt {
    cursor: pointer;
    color: rgba(255,255,255,0.32);
    transition: color 0.25s ease;
    padding: 10px 6px;
    min-height: 44px;
    display: flex;
    align-items: center;
    touch-action: manipulation;
  }
  #sky-toggle .opt:hover, #orbit-toggle .opt:hover { color: rgba(255,255,255,0.7); }
  #sky-toggle .opt.active, #orbit-toggle .opt.active { color: rgba(255,255,255,0.95); }
  #sky-toggle .sep, #orbit-toggle .sep {
    color: rgba(255,255,255,0.18);
    font-size: 0.8em;
    pointer-events: none;
  }
  #sky-toggle .loading {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    border-top-color: rgba(255,255,255,0.9);
    margin-left: 6px;
    animation: sky-spin 0.9s linear infinite;
    display: none;
  }
  #sky-toggle.loading .loading { display: inline-block; }
  @keyframes sky-spin { to { transform: rotate(360deg); } }

  /* Sun handled entirely in WebGL — no CSS overlay needed */
</style>
</head>
<body>

<!-- LOADING SCREEN — black void with a rotating wireframe sphere that
     progressively draws itself from vertex to vertex while assets load -->
<div id="loading-screen" aria-hidden="true">
  <div id="loading-content">
    <svg id="loading-sphere" viewBox="-60 -60 120 120">
      <g id="wf-rotor">
        <!-- Three orthogonal great circles, drawn in sequence -->
        <ellipse cx="0" cy="0" rx="50" ry="50" pathLength="100"></ellipse>
        <ellipse cx="0" cy="0" rx="50" ry="18" pathLength="100"></ellipse>
        <ellipse cx="0" cy="0" rx="18" ry="50" pathLength="100"></ellipse>
      </g>
    </svg>
    <div id="loading-text">PLEASE STAND BY</div>
  </div>
</div>

<!-- QUOTE -->
<div id="quote">
  <div id="quote-text"></div>
  <div id="quote-author"></div>
</div>

<!-- NAV -->
<nav id="nav">
  <button id="nav-toggle" aria-label="Menu" aria-expanded="false">
    <span class="hamburger">
      <span></span><span></span><span></span>
    </span>
    <span class="nav-label">MENU</span>
  </button>
  <div id="nav-links" role="menu">
    <a href="/english" role="menuitem">english class</a>
    <a href="/lab" role="menuitem">lab</a>
  </div>
</nav>

<!-- WELCOME — fade-cycles through a couple of intro messages, then stays out of the way -->
<div id="welcome" aria-live="polite"></div>

<!-- NOW PLAYING notification — slides in from right on music start -->
<div id="now-playing" aria-live="polite">🎵 Theme from &#8220;Armageddon&#8221; — Trevor Rabin (1998)</div>

<!-- AUDIO + mute toggle -->
<audio id="bg-music" src="assets/audio/theme from armageddon.mp3" loop preload="auto"></audio>
<button id="audio-toggle" type="button" aria-label="Toggle music" aria-pressed="false">
  <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
    <path d="M3 10v4h3l5 4V6L6 10H3z"/>
    <path class="wave-1" d="M14 9c1.4 0.7 2.3 2 2.3 3.5S15.4 15.3 14 16"/>
    <path class="wave-2" d="M16.5 6c2.7 1.3 4.5 3.7 4.5 6.5S19.2 17.7 16.5 19"/>
  </svg>
</button>

<!-- SKY TOGGLE (right edge, hidden by default — show via the ‹ handle) -->
<div id="sky-toggle" class="hidden" role="group" aria-label="Sky mode">
  <span class="opt" data-mode="stars" role="button" tabindex="0">Artificial</span>
  <span class="sep">·</span>
  <span class="opt active" data-mode="nature" role="button" tabindex="0">Natural</span>
  <span class="loading" aria-hidden="true"></span>
</div>
<button id="sky-toggle-handle" type="button" aria-label="Show or hide sky-mode toggle" aria-expanded="false">‹</button>

<!-- ORBITS TOGGLE (left edge, hidden by default — show via the › handle) -->
<div id="orbit-toggle" class="hidden" role="group" aria-label="Orbit paths">
  <span class="opt active" data-orbits="off" role="button" tabindex="0">Off</span>
  <span class="sep">·</span>
  <span class="opt" data-orbits="on" role="button" tabindex="0">Orbits</span>
</div>
<button id="orbit-toggle-handle" type="button" aria-label="Show or hide orbit toggle" aria-expanded="false">›</button>

<!-- THREE.JS -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
// ============================================================
// QUOTES
// ============================================================
const QUOTES = [
  { text: "The more I learn, the more I realize how much I don't know.", author: "Albert Einstein" },
  { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi" },
  { text: "Education is not the filling of a pail, but the lighting of a fire.", author: "W.B. Yeats" },
  { text: "The beautiful thing about learning is that no one can take it away from you.", author: "B.B. King" },
  { text: "Curiosity is the wick in the candle of learning.", author: "William Arthur Ward" },
  { text: "The mind is not a vessel to be filled, but a fire to be kindled.", author: "Plutarch" },
  { text: "Anyone who stops learning is old, whether at twenty or eighty.", author: "Henry Ford" },
  { text: "I am still learning.", author: "Michelangelo" },
  { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates" },
  { text: "Tell me and I forget. Teach me and I remember. Involve me and I learn.", author: "Benjamin Franklin" },
  { text: "Learning never exhausts the mind.", author: "Leonardo da Vinci" },
  { text: "An investment in knowledge pays the best interest.", author: "Benjamin Franklin" },
  { text: "The more that you read, the more things you will know.", author: "Dr. Seuss" },
  { text: "Wonder is the beginning of wisdom.", author: "Socrates" },
  { text: "In learning you will teach, and in teaching you will learn.", author: "Phil Collins" },
  { text: "Knowledge is of no value unless you put it into practice.", author: "Anton Chekhov" },
];

let currentQuoteIdx = Math.floor(Math.random() * QUOTES.length);
const quoteEl = document.getElementById('quote');
const quoteText = document.getElementById('quote-text');
const quoteAuthor = document.getElementById('quote-author');

function showQuote(idx, animate = false) {
  const q = QUOTES[idx];
  if (animate) {
    quoteEl.style.opacity = '0';
    quoteEl.style.transform = 'translateY(-5px)';
    setTimeout(() => {
      quoteText.textContent = '\u201c' + q.text + '\u201d';
      quoteAuthor.textContent = '— ' + q.author;
      quoteEl.style.transition = 'opacity 1s ease, transform 1s ease';
      quoteEl.style.opacity = '1';
      quoteEl.style.transform = 'translateY(0)';
    }, 700);
  } else {
    quoteText.textContent = '\u201c' + q.text + '\u201d';
    quoteAuthor.textContent = '— ' + q.author;
    quoteEl.style.opacity = '0';
    quoteEl.style.transform = 'translateY(-5px)';
    setTimeout(() => {
      quoteEl.style.transition = 'opacity 1.5s ease, transform 1.5s ease';
      quoteEl.style.opacity = '1';
      quoteEl.style.transform = 'translateY(0)';
    }, 100);
  }
}

showQuote(currentQuoteIdx);
setInterval(() => {
  currentQuoteIdx = (currentQuoteIdx + 1) % QUOTES.length;
  showQuote(currentQuoteIdx, true);
}, 12000);

// ============================================================
// NAV
// ============================================================
const navToggle = document.getElementById('nav-toggle');
const navLinks = document.getElementById('nav-links');
let navOpen = false;

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  navOpen = !navOpen;
  navToggle.classList.toggle('open', navOpen);
  navLinks.classList.toggle('open', navOpen);
  navToggle.setAttribute('aria-expanded', navOpen);
});

document.addEventListener('click', () => {
  if (navOpen) {
    navOpen = false;
    navToggle.classList.remove('open');
    navLinks.classList.remove('open');
    navToggle.setAttribute('aria-expanded', false);
  }
});

// HINT
// ============================================================
// MUSIC — Armageddon theme on loop. Browsers block autoplay until the
// user interacts with the page, so we attempt playback on every click,
// keypress, or canvas pointer-down. Once started, the audio element's
// own loop=true handles the loop (mp3 itself is short; tiny gap on the
// loop boundary, but acceptable for ambient bg music).
// ============================================================
const bgMusic     = document.getElementById('bg-music');
const audioToggle = document.getElementById('audio-toggle');
const TARGET_VOLUME = 0.42;
bgMusic.volume = TARGET_VOLUME;

let musicStarted = false;
let musicMuted   = false;

function fadeAudio(to, ms = 1200) {
  const from = bgMusic.volume;
  const t0   = performance.now();
  function tick() {
    const t = Math.min(1, (performance.now() - t0) / ms);
    bgMusic.volume = from + (to - from) * t;
    if (t < 1) requestAnimationFrame(tick);
  }
  tick();
}

function showNowPlaying() {
  const notif = document.getElementById('now-playing');
  const btn   = document.getElementById('audio-toggle');
  notif.classList.add('show');
  // After 4.5 s: slide out, then reveal speaker button
  setTimeout(() => {
    notif.classList.remove('show');
    setTimeout(() => { btn.style.opacity = '1'; }, 550);
  }, 4500);
}

function tryStartMusic() {
  if (musicStarted || musicMuted) return;
  bgMusic.play().then(() => {
    musicStarted = true;
    showNowPlaying();
  }).catch(() => { /* still blocked — wait for next gesture */ });
}

// Attempt on every gesture until we succeed
['pointerdown', 'keydown', 'touchstart'].forEach((ev) => {
  document.addEventListener(ev, tryStartMusic, { passive: true });
});

audioToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  musicMuted = !musicMuted;
  audioToggle.classList.toggle('muted', musicMuted);
  audioToggle.setAttribute('aria-pressed', String(musicMuted));
  if (musicMuted) {
    fadeAudio(0, 250);
  } else {
    if (!musicStarted) {

});

// WELCOME message — runs ONCE, after the cinematic zoom-in finishes.
// Sequence: fade-in "Welcome" (4 s visible), fade-out, brief pause,
// fade-in "Drag around …" (5 s visible), fade-out, then nothing — the
// element stays out of the way for the rest of the session.
// ============================================================
const welcomeEl = document.getElementById('welcome');
const WELCOME_LINES = [
  { text: 'Welcome',                                        hold: 4000 },
  { text: 'Drag around to see the expanse of our universe', hold: 5000 },
];

let welcomeStarted = false;
function startWelcome() {
  if (welcomeStarted) return;
  welcomeStarted = true;
  let i = 0;
  function step() {
    if (i >= WELCOME_LINES.length) return;
    const { text, hold } = WELCOME_LINES[i];
    welcomeEl.textContent = text;
    requestAnimationFrame(() => welcomeEl.classList.add('visible'));
    setTimeout(() => {
      welcomeEl.classList.remove('visible');
      i++;
      // wait for fade-out (1.1 s) + a small breath, then next line
      setTimeout(step, 1500);
    }, hold);
  }
  step();
}

// Earth radii × 30 AU). 1.5 M leaves headroom for the celestial-sphere

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1500000);

// ============================================================
// ORBIT CAMERA — Earth stays at world origin; the camera flies on a
// sphere around it. Drag anywhere on the canvas to pan the perspective;
// scroll/pinch dollies in and out. Spherical coords:
//   camDistance  — radius from origin
//   camTheta     — azimuth (around world Y axis), 0 = camera at +Z
//   camPhi       — polar angle from world +Y, π/2 = looking from equator
// ============================================================
// At real scale (1 unit = 1 Earth radius), camDistance=5 fills the frame
// with Earth (radius 1). Default 6 on portrait. User scrolls/pinches out
// to find the Moon (60 units), other planets (Mercury ~9 k, Saturn ~224 k,
// Neptune ~704 k), or the Sun (~23 k away).
let camDistance = window.innerWidth < window.innerHeight ? 6 : 5;
let camTheta    = 0.06;        // tiny offset so camera is barely off the +Z axis
let camPhi      = 1.48;        // ≈ 84.8° from +Y → roughly looking from the equator

function updateCamera() {
  const sinPhi = Math.sin(camPhi);
  camera.position.set(
    camDistance * sinPhi * Math.sin(camTheta),
    camDistance * Math.cos(camPhi),
    camDistance * sinPhi * Math.cos(camTheta)
  );
  camera.lookAt(0, 0, 0);
}

// ============================================================
// CELESTIAL SPHERE — stars + nebulae fixed in this group
// Rotates with Earth's orbital position (parallax / star drift)
// 1 full revolution per Earth year = 365.25 * 24 * 3600 sim-seconds
// ============================================================
const celestialSphere = new THREE.Group();
scene.add(celestialSphere);

function buildStarField() {
  // ── STARS ──────────────────────────────────────────────────────────────
  // Reference: NuSTAR deep field — sparse, mostly tiny colored dots,
  // few bright blue stars with soft halos, not crowded.
  // Two layers: (1) dim background dots, (2) bright foreground stars with glow sprites

  const BG_COUNT = 2000; // background dots filling the entire celestial sphere
  const bgPos = new Float32Array(BG_COUNT * 3);
  const bgCol = new Float32Array(BG_COUNT * 3);
  const bgSz  = new Float32Array(BG_COUNT);
  // Per-star twinkle phase stored as extra attrib
  const bgPhase = new Float32Array(BG_COUNT);

  for (let i = 0; i < BG_COUNT; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 900000 + Math.random() * 250000;  // outside Neptune, near skybox
    bgPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    bgPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    bgPos[i*3+2] = r * Math.cos(phi);

    // Realistic stellar color distribution — mostly white-yellow, some warm
    // reds, a few hot blue-whites. Tuned brighter than before since the prior
    // colors were paired with a broken attribute name (rendered as black).
    const t = Math.random();
    if (t < 0.55) {
      // white / pale-yellow (most common — sun-like)
      const k = 0.85 + Math.random() * 0.15;
      bgCol[i*3]=k; bgCol[i*3+1]=k*(0.92+Math.random()*0.08); bgCol[i*3+2]=k*(0.85+Math.random()*0.1);
    } else if (t < 0.78) {
      // warm yellow-orange (K-type)
      bgCol[i*3]=0.95+Math.random()*0.05; bgCol[i*3+1]=0.78+Math.random()*0.15; bgCol[i*3+2]=0.45+Math.random()*0.2;
    } else if (t < 0.90) {
      // red-orange (red giants / M-type)
      bgCol[i*3]=0.95+Math.random()*0.05; bgCol[i*3+1]=0.55+Math.random()*0.2; bgCol[i*3+2]=0.35+Math.random()*0.15;
    } else {
      // blue-white (hot young O/B-type)
      bgCol[i*3]=0.7+Math.random()*0.2; bgCol[i*3+1]=0.85+Math.random()*0.15; bgCol[i*3+2]=1.0;
    }
    bgSz[i] = 0.6 + Math.random() * 1.2;
    bgPhase[i] = Math.random() * Math.PI * 2;
  }

  const bgGeo = new THREE.BufferGeometry();
  bgGeo.setAttribute('position',   new THREE.BufferAttribute(bgPos,   3));
  bgGeo.setAttribute('aStarColor', new THREE.BufferAttribute(bgCol,   3));
  bgGeo.setAttribute('aSize',      new THREE.BufferAttribute(bgSz,    1));
  bgGeo.setAttribute('aPhase',     new THREE.BufferAttribute(bgPhase, 1));

  // Custom shader material for twinkling.
  // FIX: previous version declared `attribute vec3 starColor;` while the
  // geometry attribute was named `color` — names didn't match so colors
  // came in as zero (black on black, invisible). Renamed every attribute to
  // unambiguous `aStarColor`/`aSize`/`aPhase` to avoid any clash with
  // Three.js's built-ins (`color`, `size`).
  const bgMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `
      attribute vec3 aStarColor;
      attribute float aSize;
      attribute float aPhase;
      uniform float time;
      varying vec3 vColor;
      varying float vTwinkle;
      void main() {
        vColor = aStarColor;
        float freq = 0.8 + fract(aPhase * 7.3) * 1.4;
        vTwinkle = 0.72 + 0.28 * sin(time * freq + aPhase);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        // Stars sit ~1 M units out at real scale. Multiplier scaled so a
        // unit-size star reads as 1.5–4.5 px on screen at that distance.
        gl_PointSize = aSize * (2500000.0 / -mv.z) * vTwinkle;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vTwinkle;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = smoothstep(1.0, 0.05, d) * vTwinkle;
        if (alpha < 0.01) discard;
        gl_FragColor = vec4(vColor * vTwinkle, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  const bgStars = new THREE.Points(bgGeo, bgMat);
  celestialSphere.add(bgStars);

  // Bright foreground stars — distant pinpoints with soft halos. At
  // real scale (1 unit = 1 Earth radius) they sit near the skybox
  // (~1 M units out), well past Neptune, so they sort BEHIND every
  // body in the solar system regardless of camera angle.
  const STAR_R = 950000;
  const brightStarData = [
    {r:STAR_R*1.00, theta:0.8,  phi:1.2, size:6,  col:'rgba(140,200,255,'},  // blue
    {r:STAR_R*1.05, theta:2.1,  phi:0.7, size:5,  col:'rgba(160,210,255,'},
    {r:STAR_R*0.95, theta:3.5,  phi:1.8, size:4.5,col:'rgba(120,190,255,'},
    {r:STAR_R*1.02, theta:5.0,  phi:0.9, size:5.5,col:'rgba(150,205,255,'},
    {r:STAR_R*1.08, theta:1.4,  phi:2.4, size:4,  col:'rgba(255,240,180,'},  // warm yellow
    {r:STAR_R*0.98, theta:4.2,  phi:1.5, size:4,  col:'rgba(255,220,140,'},
    {r:STAR_R*1.04, theta:0.3,  phi:2.8, size:3.5,col:'rgba(255,180,120,'},  // orange
    {r:STAR_R*1.06, theta:2.8,  phi:0.4, size:4,  col:'rgba(130,195,255,'},  // blue
    {r:STAR_R*0.97, theta:6.0,  phi:1.1, size:5,  col:'rgba(145,202,255,'},
    {r:STAR_R*1.03, theta:3.0,  phi:2.1, size:3.5,col:'rgba(255,255,220,'},  // white
    {r:STAR_R*0.99, theta:1.8,  phi:3.0, size:4.5,col:'rgba(140,200,255,'},
    {r:STAR_R*1.10, theta:4.8,  phi:2.0, size:3,  col:'rgba(255,200,150,'},
  ];

  // Build a star glow canvas texture
  function makeStarTex(col, size) {
    const s = Math.ceil(size * 24);
    const nc = document.createElement('canvas');
    nc.width = s * 2; nc.height = s * 2;
    const ctx = nc.getContext('2d');
    // Diffuse halo
    const halo = ctx.createRadialGradient(s,s,0, s,s,s);
    halo.addColorStop(0,   col + '0.35)');
    halo.addColorStop(0.4, col + '0.12)');
    halo.addColorStop(0.8, col + '0.03)');
    halo.addColorStop(1,   col + '0)');
    ctx.fillStyle = halo; ctx.fillRect(0,0,s*2,s*2);
    // Bright core
    const core = ctx.createRadialGradient(s,s,0, s,s,s*0.18);
    core.addColorStop(0, 'rgba(255,255,255,0.95)');
    core.addColorStop(1, col + '0.5)');
    ctx.fillStyle = core; ctx.beginPath(); ctx.arc(s,s,s*0.22,0,Math.PI*2); ctx.fill();
    return new THREE.CanvasTexture(nc);
  }

  brightStarData.forEach(({ r, theta, phi: p, size, col }) => {
    const x = r * Math.sin(p) * Math.cos(theta);
    const y = r * Math.sin(p) * Math.sin(theta);
    const z = r * Math.cos(p);
    const tex = makeStarTex(col, size);
    const mat = new THREE.SpriteMaterial({
      map: tex, transparent: true, blending: THREE.AdditiveBlending,
      depthWrite: false, // depthTest stays TRUE so they sort behind solar bodies
    });
    const sp = new THREE.Sprite(mat);
    sp.position.set(x, y, z);
    // Scale proportional to distance so they remain pinpoint-sized on screen
    sp.scale.setScalar(size * 5000);
    celestialSphere.add(sp);
  });

  return bgStars; // return for animation loop reference
}

const starPoints = buildStarField();

// ============================================================
// NATURE SKY — toggleable ESO Milky Way panorama (real photograph)
// ============================================================
// 6000×3000 ESO/Brunier 360° panorama. Galactic bulge, dust lanes,
// Magellanic Clouds, Andromeda, and naked-eye nebulae are baked in
// at real sky positions. Wrapped on an inverted sphere and tilted so
// the galactic poles sit on world ±Y (out of camera FOV) — kills the
// equirectangular pole-singularity "vortex" that appears at high tilts.
const SKY_HD_LOCAL = 'assets/milkyway-hd.jpg';
const SKY_HD_CDN   = 'https://upload.wikimedia.org/wikipedia/commons/6/60/ESO_-_Milky_Way.jpg';
const SKY_LD_LOCAL = 'assets/milkyway.jpg';
const SKY_LD_CDN   = 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/ESO_-_Milky_Way.jpg/3840px-ESO_-_Milky_Way.jpg';

let skyTilt = null;
let skyTexCache = null;
let skyLoading = false;

async function ensureNatureSky() {
  if (skyTilt || skyLoading) return;
  skyLoading = true;
  document.getElementById('sky-toggle').classList.add('loading');
  try {
    if (!skyTexCache) {
      skyTexCache =
        (await loadTex(SKY_HD_LOCAL)) ||
        (await loadTex(SKY_HD_CDN))   ||
        (await loadTex(SKY_LD_LOCAL)) ||
        (await loadTex(SKY_LD_CDN));
      if (!skyTexCache) return; // all sources failed; procedural stars carry on
      skyTexCache.colorSpace = THREE.SRGBColorSpace;
      skyTexCache.anisotropy = renderer.capabilities.getMaxAnisotropy();
    }
    skyTilt = new THREE.Group();
    // X=0 so galactic poles stay on world Y axis (vertical, off-screen) —
    // no equirectangular pole singularity in the camera's view.
    // Y=π/2 puts the galactic-center bulge directly in front of camera.
    // Z=28° tilts the band into a pleasing diagonal across the screen.
    skyTilt.rotation.set(0, Math.PI / 2, THREE.MathUtils.degToRad(28));

    const skyMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1200000, 64, 32), // beyond Neptune (~704k)
      new THREE.MeshBasicMaterial({
        map: skyTexCache,
        side: THREE.BackSide,
        depthWrite: false,
        // Warm-gray multiplier — long-exposure feel, lets dust lanes pop
        color: 0xc8c2b2,
        toneMapped: false,
      })
    );
    skyMesh.renderOrder = -1;
    skyTilt.add(skyMesh);
    celestialSphere.add(skyTilt);
  } finally {
    skyLoading = false;
    document.getElementById('sky-toggle').classList.remove('loading');
  }
}

function removeNatureSky() {
  if (!skyTilt) return;
  const mesh = skyTilt.children[0];
  celestialSphere.remove(skyTilt);
  if (mesh) {
    mesh.geometry.dispose();
    mesh.material.dispose();
  }
  skyTilt = null;
}

// ============================================================
// SKY MODE TOGGLE — STARS (procedural only) / NATURE (panorama)
// ============================================================
const skyToggleEl = document.getElementById('sky-toggle');
const skyToggleOpts = skyToggleEl.querySelectorAll('.opt');
let skyMode = localStorage.getItem('oprek.skyMode') || 'nature';

function setSkyMode(mode) {
  if (mode !== 'stars' && mode !== 'nature') mode = 'stars';
  skyMode = mode;
  localStorage.setItem('oprek.skyMode', mode);
  skyToggleOpts.forEach((opt) => {
    opt.classList.toggle('active', opt.dataset.mode === mode);
    opt.setAttribute('aria-pressed', opt.dataset.mode === mode);
  });
  if (mode === 'nature') ensureNatureSky();
  else removeNatureSky();
}

skyToggleOpts.forEach((opt) => {
  const handler = (e) => { e.stopPropagation(); setSkyMode(opt.dataset.mode); };
  opt.addEventListener('click', handler);
  opt.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(e); }
  });
});

// Moon distance — REAL: 60.3 Earth-radii from Earth's centre. With

// Moon trail
const trailCount = 80;
const trailPositions = new Float32Array(trailCount * 3);

// ============================================================
// ECLIPTIC PLANE — single tilted group containing the Sun and every
// planet (Mercury through Saturn). One plane, one Sun, all orbits
// strictly coplanar — the textbook layout. Earth stays at scene origin
// (camera focus) and is the only planet not inside this group; its
// orbit ring is, however, drawn inside the group so it shares the same
// tilt as the rest of the solar system.
// ============================================================
const eclipticGroup = new THREE.Group();
// Mild ecliptic tilt — textbook view of the orbital plane from slightly
// above, NOT looking down a pole. -28° on X is roughly the angle a real
// astronomy diagram uses; small Z roll lifts the Sun to upper-left.
eclipticGroup.rotation.set(
  THREE.MathUtils.degToRad(-28),  // X: gentle pitch — orbits become wide flat ellipses
  0,                               // Y: none
  THREE.MathUtils.degToRad(-22),  // Z: roll — Sun ends up upper-left of Earth
);
scene.add(eclipticGroup);

// ============================================================
// SUN — visual + lighting. Sun lives at LOCAL (-AU, 0, 0) inside
// eclipticGroup. Earth is at scene origin (= eclipticGroup origin), so
// Earth-Sun distance is exactly AU regardless of how the group is tilted.
// ============================================================
// Real-scale: 1 scene unit = 1 Earth radius. Then 1 AU = 23,481 Earth
// radii (the actual ratio). All distances and body sizes flow from this
// — Moon at 60, Mercury at 0.39 AU, Sun radius 109, etc.
const AU = 23481;
const SUN_LOCAL = new THREE.Vector3(-AU, 0, 0);
// Public-domain planet textures (CORS-friendly, served by jsdelivr from
// the threex.planets repo). Used by both the Sun setup below and the
// PLANET_DATA block further down.
const TEX_BASE = 'https://cdn.jsdelivr.net/gh/jeromeetienne/threex.planets@master/images/';
// Sun's WORLD position — needed for the directional light (which lives
// in scene-space, not eclipticGroup-space).
const SUN_WORLD = SUN_LOCAL.clone().applyEuler(eclipticGroup.rotation);

// Sun body — radius 4 (capped, see comment at top of section). Wrapped
// in a tilted group (Sun's actual axial tilt is 7.25° from ecliptic) so
// the spin pivots through the Sun's real poles. Texture from
// threex.planets — gives the Sun a granulated surface instead of a
// flat-yellow disc. MeshBasicMaterial because the Sun is a light source
// (no scene lighting on it).
const sunGroup = new THREE.Group();
sunGroup.position.copy(SUN_LOCAL);
sunGroup.rotation.z = 7.25 * Math.PI / 180;
eclipticGroup.add(sunGroup);

// this is exactly 109. Higher poly count so the curvature stays smooth
// when the user zooms close to the Sun's surface.

// Procedural high-res Sun texture — 2048 × 1024 equirectangular canvas
// painted with red-orange base, dense granulation noise, and sunspot
// dark patches. Looks like a close-up of the photosphere instead of the
// flat-yellow tile from threex.planets.
function makeSunTexture(W = 2048, H = 1024) {
  const c = document.createElement('canvas');
  c.width = W; c.height = H;
  const ctx = c.getContext('2d');

  // 1. Base — bright warm gradient (limb slightly cooler than centre)
  const base = ctx.createLinearGradient(0, 0, 0, H);
  base.addColorStop(0,    '#e06018');
  base.addColorStop(0.5,  '#ffb030');
  base.addColorStop(1,    '#d05515');
  ctx.fillStyle = base;
  ctx.fillRect(0, 0, W, H);

  // 2. Granulation — tens of thousands of small bright/dark cells
  for (let i = 0; i < 80000; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 1 + Math.random() * 2.6;
    if (Math.random() < 0.55) {
      // bright cell — yellow-orange flare
      const a = 0.18 + Math.random() * 0.45;
      ctx.fillStyle = `rgba(255,${190 + (Math.random()*65|0)},${80 + (Math.random()*100|0)},${a})`;
    } else {
      // dark cell — deep red shadow
      const a = 0.18 + Math.random() * 0.40;
      ctx.fillStyle = `rgba(${90 + (Math.random()*60|0)},${20 + (Math.random()*30|0)},${5 + (Math.random()*15|0)},${a})`;
    }
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 3. Bigger plasma "blobs" for medium-scale variation
  for (let i = 0; i < 300; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 12 + Math.random() * 30;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    if (Math.random() < 0.6) {
      grad.addColorStop(0, `rgba(255,${180 + (Math.random()*60|0)},${60 + (Math.random()*80|0)},0.35)`);
      grad.addColorStop(1, 'rgba(255,160,40,0)');
    } else {
      grad.addColorStop(0, 'rgba(70,15,0,0.45)');
      grad.addColorStop(1, 'rgba(70,15,0,0)');
    }
    ctx.fillStyle = grad;
    ctx.fillRect(x - r, y - r, r * 2, r * 2);
  }

  // 4. Sunspots — distinct dark cores with surrounding penumbra
  for (let i = 0; i < 14; i++) {
    const x = Math.random() * W;
    const y = H * 0.25 + Math.random() * H * 0.5; // mid-latitudes (real sunspots)
    const r = 14 + Math.random() * 28;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0,    'rgba(20,5,0,0.92)');
    grad.addColorStop(0.35, 'rgba(50,15,0,0.70)');
    grad.addColorStop(0.70, 'rgba(120,40,5,0.40)');
    grad.addColorStop(1,    'rgba(180,70,15,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  // 5. Bright surface flares — rare hot spots
  for (let i = 0; i < 22; i++) {
    const x = Math.random() * W;
    const y = Math.random() * H;
    const r = 4 + Math.random() * 8;
    const grad = ctx.createRadialGradient(x, y, 0, x, y, r);
    grad.addColorStop(0, 'rgba(255,255,200,0.85)');
    grad.addColorStop(0.5, 'rgba(255,210,100,0.45)');
    grad.addColorStop(1, 'rgba(255,160,40,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();
  }

  const tex = new THREE.CanvasTexture(c);
  tex.colorSpace = THREE.SRGBColorSpace;
  tex.anisotropy = renderer.capabilities.getMaxAnisotropy();
  return tex;
}
sunMat.map = makeSunTexture();

// ── RAY SPIKES — radial streaks emanating from the Sun, the
// recognisable "lens-flare star" silhouette. Procedural canvas with

const sunRaysCanvas = document.createElement('canvas');
sunRaysCanvas.width = 512; sunRaysCanvas.height = 512;
{
  const ctx = sunRaysCanvas.getContext('2d');
  const cx = 256, cy = 256;
  ctx.translate(cx, cy);
  // 16 rays — alternating long/short
  for (let i = 0; i < 16; i++) {
    const ang = (i / 16) * Math.PI * 2;
    const long = (i % 2 === 0);
    const len = long ? 240 : 140;
    const width = long ? 4.5 : 2.2;
    ctx.save();
    ctx.rotate(ang);
    const grad = ctx.createLinearGradient(0, 0, len, 0);
    grad.addColorStop(0,    'rgba(255,245,180,0.75)');
    grad.addColorStop(0.25, 'rgba(255,210,110,0.40)');
    grad.addColorStop(0.60, 'rgba(255,170,60,0.12)');
    grad.addColorStop(1,    'rgba(255,120,30,0.01)');
    ctx.strokeStyle = grad;
    ctx.lineWidth = width;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(0, 0);
    ctx.lineTo(len, 0);
    ctx.stroke();
    ctx.restore();
  }
  // Bright glow at the centre to bind the rays to the disc
  ctx.translate(-cx, -cy);
  const cg = ctx.createRadialGradient(cx, cy, 0, cx, cy, 80);
  cg.addColorStop(0,   'rgba(255,255,220,0.45)');
  cg.addColorStop(0.5, 'rgba(255,200,100,0.15)');
  cg.addColorStop(1,   'rgba(255,160,40,0)');
  ctx.fillStyle = cg;
  ctx.fillRect(0, 0, 512, 512);
}

// ── SCREEN-SPACE LENS FLARE — 2D canvas overlay drawn each frame.
// Bokeh circles + anamorphic streak anchored to Sun's projected screen pos.
// Flare scale grows as camera approaches Earth (telescopic effect).
const _flareOverlay = document.createElement('canvas');
_flareOverlay.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:2;';
document.body.appendChild(_flareOverlay);

function _syncFlareCv() {
  _flareOverlay.width  = window.innerWidth;
  _flareOverlay.height = window.innerHeight;
}
_syncFlareCv();
window.addEventListener('resize', _syncFlareCv);

const _sunNDC = new THREE.Vector3();
const _sunWorldFlare = new THREE.Vector3();

function _drawBlob(ctx, x, y, r, r0, g0, b0, a) {
  const grd = ctx.createRadialGradient(x, y, 0, x, y, r);
  grd.addColorStop(0,    `rgba(${r0},${g0},${b0},${a})`);
  grd.addColorStop(0.40, `rgba(${r0},${g0},${b0},${(a*0.65).toFixed(3)})`);
  grd.addColorStop(0.70, `rgba(${r0},${g0},${b0},${(a*0.18).toFixed(3)})`);
  grd.addColorStop(1,    `rgba(${r0},${g0},${b0},0)`);
  ctx.fillStyle = grd;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

function updateLensFlare() {
  const ctx  = _flareOverlay.getContext('2d');
  const W = _flareOverlay.width, H = _flareOverlay.height;
  ctx.clearRect(0, 0, W, H);

  // Distance-based visibility (matches the 3D sprite fade)
  const rawT = (camDistance - 80000) / (500000 - 80000);
  const sf = Math.max(0, Math.min(1, 1 - rawT));
  if (sf < 0.01) return;

  // Project Sun to screen coords
  eclipticGroup.localToWorld(_sunWorldFlare.copy(SUN_LOCAL));
  _sunNDC.copy(_sunWorldFlare).project(camera);
  if (_sunNDC.z > 1) return; // behind camera

  const sx = (_sunNDC.x *  0.5 + 0.5) * W;
  const sy = (_sunNDC.y * -0.5 + 0.5) * H;

  // Skip entirely if Sun is far off-screen
  if (sx < -W * 0.6 || sx > W * 1.6 || sy < -H * 0.6 || sy > H * 1.6) return;

  // Flare grows as camera zooms toward Earth (telescopic)
  const fs = Math.max(0.25, Math.min(2.2, 80000 / (camDistance + 4000))) * sf;
  const diag = Math.sqrt(W * W + H * H);

  // Anamorphic horizontal streak through Sun
  const sLen = diag * 0.85 * fs;
  const sH   = Math.max(1, 2.5 * fs);
  for (const [len, alpha, cr, cg, cb] of [
    [sLen,       0.50, 255, 230, 160],
    [sLen * 1.4, 0.18, 180, 200, 255],
  ]) {
    const sg = ctx.createLinearGradient(sx - len/2, sy, sx + len/2, sy);
    sg.addColorStop(0,   `rgba(${cr},${cg},${cb},0)`);
    sg.addColorStop(0.35,`rgba(${cr},${cg},${cb},${(alpha*sf*0.45).toFixed(3)})`);
    sg.addColorStop(0.5, `rgba(${cr},${cg},${cb},${(alpha*sf).toFixed(3)})`);
    sg.addColorStop(0.65,`rgba(${cr},${cg},${cb},${(alpha*sf*0.45).toFixed(3)})`);
    sg.addColorStop(1,   `rgba(${cr},${cg},${cb},0)`);
    ctx.fillStyle = sg;
    ctx.fillRect(sx - len/2, sy - sH/2, len, sH);
  }

  // Bokeh circles reflected through screen centre
  const ax = W * 0.5 - sx, ay = H * 0.5 - sy;
  for (const [t, rFrac, r0, g0, b0, baseA] of [
    [0.30, 0.028, 255, 185,  55, 0.62],
    [0.50, 0.048, 255, 220, 110, 0.45],
    [0.68, 0.022, 180, 195, 255, 0.70],
    [0.85, 0.065, 255, 155,  40, 0.42],
    [1.02, 0.034, 200, 215, 255, 0.58],
    [1.22, 0.052, 255, 195,  70, 0.35],
    [1.45, 0.028, 210, 175, 255, 0.50],
    [1.72, 0.070, 255, 165,  45, 0.30],
    [2.05, 0.022, 255, 235, 145, 0.42],
  ]) {
    _drawBlob(ctx, sx + ax*t, sy + ay*t, diag*rFrac*fs, r0, g0, b0, baseA*sf);
  }
}

// ============================================================
// PLANETS — coplanar circular orbits centered on the Sun
// ============================================================
// Distances are in AU (compressed for outer planets so they all fit
// on screen — the user wanted "scientifically close" not exact).
// Real sidereal rotation periods kept (Mercury slow, Jupiter fast,
// Venus retrograde).
// r       = body radius in scene units. With 1 unit = 1 Earth radius,
//           every value is the planet's REAL Earth-radii ratio.
// dist    = orbital radius in AU (× AU = 23,481 to get scene units)
// theta   = initial orbital phase (radians)
// tiltDeg = real axial tilt (applied to parent group so the mesh's local
//           Y is the planet's actual spin axis; texture poles pivot)
// tex     = equirectangular surface map (jsdelivr/threex.planets)
const PLANET_DATA = [
  { name:'Mercury', r:0.383, dist: 0.39, theta: 0.6,  tiltDeg:  0.034, period:   88, rotDays: 58.6,  tex:TEX_BASE+'mercurymap.jpg' },
  { name:'Venus',   r:0.949, dist: 0.72, theta:-0.9,  tiltDeg:177.4,   period:  225, rotDays:-243.0, tex:TEX_BASE+'venusmap.jpg'   },
  { name:'Mars',    r:0.532, dist: 1.52, theta: 1.6,  tiltDeg: 25.19,  period:  687, rotDays:  1.026, tex:TEX_BASE+'marsmap1k.jpg'  },
  { name:'Jupiter', r:11.21, dist: 5.20, theta:-2.1,  tiltDeg:  3.13,  period: 4333, rotDays:  0.413, tex:TEX_BASE+'jupitermap.jpg' },
  { name:'Saturn',  r: 9.45, dist: 9.54, theta: 2.4,  tiltDeg: 26.73,  period:10759, rotDays:  0.444, tex:TEX_BASE+'saturnmap.jpg', rings:true },
  { name:'Uranus',  r: 4.01, dist:19.20, theta:-1.3,  tiltDeg: 97.77,  period:30687, rotDays: -0.72,  tex:TEX_BASE+'uranusmap.jpg'  },
  { name:'Neptune', r: 3.88, dist:30.05, theta: 1.9,  tiltDeg: 28.32,  period:60190, rotDays:  0.671, tex:TEX_BASE+'neptunemap.jpg' },
];

const planetMeshes = [];

PLANET_DATA.forEach((p) => {
  // Axial-tilt group — its rotation.z is the planet's true axial tilt.
  // The planet mesh sits inside as a child, so the mesh's *local Y axis*
  // is now the planet's actual spin axis. Spinning via mesh.rotation.y
  // pivots strictly through the texture's north and south poles.
  const planetGroup = new THREE.Group();
  planetGroup.rotation.z = (p.tiltDeg || 0) * Math.PI / 180;

  const orbitR = p.dist * AU;
  planetGroup.position.set(
    SUN_LOCAL.x + orbitR * Math.cos(p.theta),
    SUN_LOCAL.y,
    SUN_LOCAL.z + orbitR * Math.sin(p.theta)
  );
  eclipticGroup.add(planetGroup);

  // Use Phong (not Standard) so the texture survives the existing scene
  // lighting setup without a costly metalness/roughness path. Bumped poly
  // count so big planets (Jupiter/Saturn) stay smooth even when zoomed in.
  const segs = p.r > 1 ? 64 : 32;
  const mat = new THREE.MeshPhongMaterial({ color: 0xffffff, shininess: 4 });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(p.r, segs, segs), mat);
  planetGroup.add(mesh);

  // Async-load equirectangular surface texture
  if (p.tex) {
    loadTex(p.tex).then((t) => {
      if (!t) return;
      t.colorSpace = THREE.SRGBColorSpace;
      t.anisotropy = renderer.capabilities.getMaxAnisotropy();
      mat.map = t;
      mat.needsUpdate = true;
    });
  }

  // Saturn's ring — child of planetGroup so it inherits the axial tilt
  // (real Saturn rings sit in the planet's equatorial plane). Textured
  // with the iconic ring color map; the JPEG's brightness drives both
  // colour AND alpha, so dark gaps between rings render transparent.
  let ringMesh = null;
  if (p.rings) {
    // Saturn ring proportions: real values are 1.11× to 2.27× planet radius
    const RING_INNER = p.r * 1.11;
    const RING_OUTER = p.r * 2.27;
    const rGeo = new THREE.RingGeometry(RING_INNER, RING_OUTER, 192);
    // RingGeometry default UVs run as (u,v) per quad. Re-map so the
    // texture stripes are read radially — each ring band is a vertical
    // column of the source image.
    {
      const pos = rGeo.attributes.position;
      const uv = rGeo.attributes.uv;
      for (let i = 0; i < pos.count; i++) {
        const x = pos.getX(i), y = pos.getY(i);
        const r = Math.hypot(x, y);
        const tU = (r - RING_INNER) / (RING_OUTER - RING_INNER);
        uv.setXY(i, tU, 1);
      }
      uv.needsUpdate = true;
    }
    const rMat = new THREE.MeshBasicMaterial({
      transparent: true, opacity: 0.95,
      side: THREE.DoubleSide, depthWrite: false,
    });
    ringMesh = new THREE.Mesh(rGeo, rMat);
    // Lay the ring flat in the planet's equatorial plane (planetGroup's
    // local XZ — the tilt is already on the parent group).
    ringMesh.rotation.x = Math.PI / 2;
    planetGroup.add(ringMesh);

    loadTex(TEX_BASE + 'saturnringcolor.jpg').then((t) => {
      if (!t) return;
      t.colorSpace = THREE.SRGBColorSpace;
      rMat.map = t;
      rMat.alphaMap = t;          // brightness drives alpha → dark gaps go transparent
      rMat.needsUpdate = true;
    });
  }

  const angSpeed = (2 * Math.PI) / (p.period * 24 * 3600);
  const rotSpeed = (2 * Math.PI) / (Math.abs(p.rotDays) * 24 * 3600);
  const rotDir   = p.rotDays < 0 ? -1 : 1; // Venus retrograde

  planetMeshes.push({
    group: planetGroup, mesh, ringMesh, angSpeed, rotSpeed, rotDir,
    initAngle: p.theta, orbitR, sunLocal: SUN_LOCAL,
  });
});

const planetPivots = []; // legacy — animation drives planetMeshes directly

// ============================================================
// ORBIT PATHS — Earth + every planet + Moon, controlled by the left
// ORBITS toggle. Thin LineLoop rings (1px hairline) with a high opacity
// so they read clearly on any background without looking like bloated
// strips around the planets.
// ============================================================
const orbitMeshes = [];

function makeOrbitRing(radius, opacity, color = 0x9aaad0, segments = 256) {
  const pts = [];
  for (let i = 0; i <= segments; i++) {
    const a = (i / segments) * Math.PI * 2;
    pts.push(new THREE.Vector3(Math.cos(a) * radius, 0, Math.sin(a) * radius));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);
  const mat = new THREE.LineBasicMaterial({
    color, transparent: true, opacity, depthWrite: false,
  });
  return new THREE.LineLoop(geo, mat);
}

// Earth's own orbit around the Sun — a full ring of radius AU centered
// on the Sun, lying in the ecliptic. Earth itself stays at scene origin
// (one fixed point on this ring, since this is the camera-fixed view).
{
  const ring = makeOrbitRing(AU, 0.75, 0xb0c0e0);
  ring.position.copy(SUN_LOCAL);
  ring.visible = false;
  eclipticGroup.add(ring);
  orbitMeshes.push(ring);
}

// Other planets' orbits — same plane as Earth's, all centered on Sun
planetMeshes.forEach((p) => {
  const ring = makeOrbitRing(p.orbitR, 0.55, 0x6b7898);
  ring.position.copy(p.sunLocal);
  ring.visible = false;
  eclipticGroup.add(ring);
  orbitMeshes.push(ring);
});

// Moon orbit — child of moonOrbitGroup so it inherits the 5.14° tilt
// and stays exactly where the moon traces its orbit (same parent group,
// same plane, same radius). Bigger segment count keeps the small ring
// looking circular even up close.
let moonOrbitRing = null;
{
  moonOrbitRing = makeOrbitRing(MOON_DIST, 0.7, 0xa0afc8, 192);
  moonOrbitRing.visible = false;
  moonOrbitGroup.add(moonOrbitRing);
  orbitMeshes.push(moonOrbitRing);
}

function setOrbitsVisible(visible) {
  for (const m of orbitMeshes) m.visible = visible;
}

// ============================================================
// ORBIT PATHS TOGGLE — left side, mirrors the sky toggle
// ============================================================
const orbitToggleEl   = document.getElementById('orbit-toggle');
const orbitToggleOpts = orbitToggleEl.querySelectorAll('.opt');
let orbitsMode = localStorage.getItem('oprek.orbitsMode') || 'off';

function setOrbitsMode(mode) {
  if (mode !== 'on' && mode !== 'off') mode = 'off';
  orbitsMode = mode;
  localStorage.setItem('oprek.orbitsMode', mode);
  setOrbitsVisible(mode === 'on');
  orbitToggleOpts.forEach((opt) => {
    opt.classList.toggle('active', opt.dataset.orbits === mode);
    opt.setAttribute('aria-pressed', opt.dataset.orbits === mode);
  });
}

orbitToggleOpts.forEach((opt) => {
  const handler = (e) => { e.stopPropagation(); setOrbitsMode(opt.dataset.orbits); };
  opt.addEventListener('click', handler);
  opt.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); handler(e); }
  });
});

setOrbitsMode(orbitsMode); // initial

// ============================================================
// COSMIC EVENTS
// ============================================================
const cosmicObjects = [];

// Meteor / shooting star
function spawnMeteor() {
  const geo = new THREE.BufferGeometry();
  const len = 2.5 + Math.random() * 4;
  const dir = new THREE.Vector3(
    (Math.random() - 0.5) * 0.6 - 0.4,
    -0.5 - Math.random() * 0.5,
    (Math.random() - 0.5) * 0.4
  ).normalize();

  // Start from random edge of screen (in 3D space near camera)
  const start = new THREE.Vector3(
    (Math.random() - 0.5) * 30,
    8 + Math.random() * 8,
    -5 + Math.random() * 8
  );

  const pts = [start.clone(), start.clone().addScaledVector(dir, len)];
  geo.setFromPoints(pts);

  const brightness = 0.7 + Math.random() * 0.3;
  const mat = new THREE.LineBasicMaterial({
    color: new THREE.Color(brightness, brightness * 0.95, brightness * 0.85),
    transparent: true, opacity: 0.9
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  cosmicObjects.push({
    type: 'meteor', mesh: line, mat,
    velocity: dir.clone().multiplyScalar(0.35 + Math.random() * 0.25),
    life: 0, maxLife: 0.6 + Math.random() * 0.4
  });
}

// Comet (longer trail, slower)
function spawnComet() {
  const trailLen = 6 + Math.random() * 8;
  const dir = new THREE.Vector3(
    (Math.random() - 0.5) * 0.8,
    -0.2 - Math.random() * 0.3,
    (Math.random() - 0.5) * 0.5
  ).normalize();

  const start = new THREE.Vector3(
    (Math.random() - 0.5) * 50,
    12 + Math.random() * 10,
    -20 + Math.random() * 15
  );

  const pts = [];
  for (let i = 0; i <= 20; i++) {
    pts.push(start.clone().addScaledVector(dir, (i / 20) * trailLen));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);

  // Gradient-ish via vertex colors workaround: just use a very bright line
  const mat = new THREE.LineBasicMaterial({
    color: 0xccddff, transparent: true, opacity: 0.75
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  // Nucleus
  const nucleusMat = new THREE.MeshBasicMaterial({ color: 0xeeeeff });
  const nucleus = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), nucleusMat);
  nucleus.position.copy(pts[pts.length - 1]);
  scene.add(nucleus);

  cosmicObjects.push({
    type: 'comet', mesh: line, mat, nucleus,
    velocity: dir.clone().multiplyScalar(0.06 + Math.random() * 0.04),
    life: 0, maxLife: 8 + Math.random() * 6
  });
}

// Asteroid (small dot tumbling across)
function spawnAsteroid() {
  const mat = new THREE.MeshBasicMaterial({ color: 0x887766, transparent: true, opacity: 0.85 });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.06 + Math.random() * 0.08, 6, 6), mat);
  mesh.position.set(
    (Math.random() - 0.5) * 40,
    5 + Math.random() * 8,
    -10 + Math.random() * 10
  );
  scene.add(mesh);

  const vel = new THREE.Vector3(
    (Math.random() - 0.5) * 0.12,
    -0.03 - Math.random() * 0.04,
    (Math.random() - 0.5) * 0.06
  );

  cosmicObjects.push({
    type: 'asteroid', mesh, mat,
    velocity: vel,
    rotSpeed: new THREE.Vector3(Math.random() * 0.05, Math.random() * 0.05, Math.random() * 0.05),
    life: 0, maxLife: 10 + Math.random() * 8
  });
}

// Aurora removed — was misleading visually

// Probabilities per frame at ~60fps
const EVENT_PROB = {
  meteor:   0.004,
  comet:    0.00008,
  asteroid: 0.0005,

};

function tickCosmicEvents(dt) {
  // Don't spawn new events while user is dragging
  if (!isDragging) {
    const r = Math.random();
    if (r < EVENT_PROB.meteor)   spawnMeteor();
    if (r < EVENT_PROB.comet)    spawnComet();
    if (r < EVENT_PROB.asteroid) spawnAsteroid();
  }

  // Still tick existing events to let them finish gracefully

  for (let i = cosmicObjects.length - 1; i >= 0; i--) {
    const obj = cosmicObjects[i];
    obj.life += dt;
    const t = obj.life / obj.maxLife; // 0→1

    if (obj.type === 'meteor') {
      obj.mesh.position.addScaledVector(obj.velocity, dt * 60);
      obj.mat.opacity = t < 0.3 ? t / 0.3 : (1 - (t - 0.3) / 0.7);
      obj.mat.opacity *= 0.9;
      if (t >= 1) { scene.remove(obj.mesh); obj.mesh.geometry.dispose(); cosmicObjects.splice(i, 1); }
    }

    if (obj.type === 'comet') {
      obj.mesh.position.addScaledVector(obj.velocity, dt * 60);
      obj.nucleus.position.addScaledVector(obj.velocity, dt * 60);
      obj.mat.opacity = t < 0.1 ? t / 0.1 * 0.75 : t > 0.8 ? (1 - t) / 0.2 * 0.75 : 0.75;
      if (t >= 1) { scene.remove(obj.mesh); scene.remove(obj.nucleus); cosmicObjects.splice(i, 1); }
    }

    if (obj.type === 'asteroid') {
      obj.mesh.position.addScaledVector(obj.velocity, dt * 60);
      obj.mesh.rotation.x += obj.rotSpeed.x;
      obj.mesh.rotation.y += obj.rotSpeed.y;
      obj.mat.opacity = t < 0.1 ? t / 0.1 * 0.85 : t > 0.85 ? (1 - t) / 0.15 * 0.85 : 0.85;
      if (t >= 1) { scene.remove(obj.mesh); cosmicObjects.splice(i, 1); }
    }


  }
}

// ============================================================
// INTERACTION — drag anywhere to orbit the camera around Earth
// ============================================================
// Earth (and the Moon, the planets, the sky) all run on their own
// natural rotations every frame, untouched by user input. The user
// only controls the camera: drag pans the orbit angle, wheel/pinch
// zooms in and out.
const TIME_RATE = 3600;     // 1 real-second = 1 sim-hour (fixed)

let isDragging = false;
let lastDragX  = 0;
let lastDragY  = 0;
let idleTimer  = null;

// Earth's spin axis in world coords — tilted 23.5° around Z (Polaris-like)
const EARTH_AXIS = new THREE.Vector3(0, 1, 0).applyEuler(
  new THREE.Euler(0, 0, 23.5 * Math.PI / 180)
).normalize();

// Moon's orbit accumulator (no longer driven by the user)
let moonOrbitY = 0;

// Cursor → camera rotation sensitivity (radians per pixel). Tuned so a
// full screen-width drag is roughly 180° of orbit.
const ORBIT_K = 0.005;

// (time-indicator element removed — TIME_RATE is now fixed and the
// indicator served no purpose. nothing reads `timeIndicator` anymore.)

// Project a world Vector3 to screen pixel coords
function worldToScreen(v3) {
  const v = v3.clone().project(camera);
  return {
    x: (v.x *  0.5 + 0.5) * window.innerWidth,
    y: (v.y * -0.5 + 0.5) * window.innerHeight,
  };
}

// Check if screen point (px,py) is within radius of a world position
function nearObject(px, py, worldPos, radiusPx) {
  const s = worldToScreen(worldPos);
  const dx = px - s.x, dy = py - s.y;
  return Math.sqrt(dx*dx + dy*dy) < radiusPx;
}

function getXY(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function onPointerDown(e) {
  // Ignore second/third fingers — those are pinch-zoom, not drag
  if (e.touches && e.touches.length >= 2) return;
  const { x, y } = getXY(e);

  autoRotate  = false;
  zoomingHome = false;
  if (idleTimer) { clearTimeout(idleTimer); idleTimer = null; }

  isDragging = true;
  lastDragX = x;
  lastDragY = y;
  renderer.domElement.style.cursor = 'grabbing';
  // Clear active cosmic events so they don't fly past at warp during the orbit
  for (let i = cosmicObjects.length - 1; i >= 0; i--) {
    const obj = cosmicObjects[i];
    scene.remove(obj.mesh);
    if (obj.nucleus) scene.remove(obj.nucleus);
  }
  cosmicObjects.length = 0;
  e.preventDefault();
}

function onPointerMove(e) {
  if (!isDragging) return;
  const { x, y } = getXY(e);
  const dx = x - lastDragX;
  const dy = y - lastDragY;
  lastDragX = x;
  lastDragY = y;

  // Drag → orbit camera around Earth. Sign convention matches Three.js
  // OrbitControls: drag right → world appears to follow finger right
  // (camera swings opposite). Polar angle clamped to avoid pole flip.
  camTheta -= dx * ORBIT_K;
  camPhi   -= dy * ORBIT_K;
  camPhi = Math.max(0.05, Math.min(Math.PI - 0.05, camPhi));
  updateCamera();

  e.preventDefault();
}

function onPointerUp() {
  isDragging = false;
  renderer.domElement.style.cursor = 'grab';
  idleTimer = setTimeout(() => {
    autoRotate = true;
    if (Math.abs(camDistance - ZOOM_TO) > 0.5) {
      zoomingHome     = true;
      zoomHomeStartT  = performance.now() / 1000;
      zoomHomeStartDist = camDistance;
    }
  }, 5000);
}

// Hover cursor hint — anywhere on canvas is grabbable
renderer.domElement.style.cursor = 'grab';

renderer.domElement.addEventListener('mousedown',  onPointerDown, { passive: false });
renderer.domElement.addEventListener('mousemove',  onPointerMove, { passive: false });
renderer.domElement.addEventListener('mouseup',    onPointerUp);
window.addEventListener('mouseup', onPointerUp); // catch release outside canvas
renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: false });
renderer.domElement.addEventListener('touchmove',  onPointerMove, { passive: false });
renderer.domElement.addEventListener('touchend',   onPointerUp);

// ============================================================
// ZOOM — mousewheel and two-finger pinch dolly the camera radius along
// the orbit-sphere. Range at real scale: close enough to brush Earth's
// atmosphere (Earth radius 1, atmosphere 1.05, gap = 1.5), far enough
// to leave Neptune (~704 k from Earth) inside the frame.
// ============================================================
const ZOOM_MIN = 1.5;
const ZOOM_MAX = 800000;

function clampZoom(z) { return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)); }

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  zoomingHome = false;
  const factor = Math.exp(e.deltaY * 0.001);
  camDistance = clampZoom(camDistance * factor);
  updateCamera();
}, { passive: false });

// Pinch-to-zoom on touch devices
let pinchStartDist = 0;
let pinchStartZ    = 0;

renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    // A second finger landed — abort any in-flight single-touch drag
    if (isDragging) {
      isDragging = false;
      renderer.domElement.style.cursor = 'grab';
    }
    const a = e.touches[0], b = e.touches[1];
    pinchStartDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    pinchStartZ = camDistance;
  }
}, { passive: true });

renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinchStartDist > 0) {
    e.preventDefault();
    zoomingHome = false;
    const a = e.touches[0], b = e.touches[1];
    const d = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    camDistance = clampZoom(pinchStartZ * (pinchStartDist / d));
    updateCamera();
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', () => { pinchStartDist = 0; });

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();
let elapsedSim = 0; // simulated seconds

// Constants
const EARTH_ROT_SPEED = (2 * Math.PI) / (24 * 3600);   // rad/sim-second
const MOON_ORB_SPEED  = (2 * Math.PI) / (27.3 * 24 * 3600);
// planet speeds handled per-mesh via planetMeshes[].angSpeed

function animate() {
  requestAnimationFrame(animate);
  const dt    = clock.getDelta();
  const simDt = dt * TIME_RATE;
  elapsedSim += simDt;

  // Auto-rotate — runs even during zoom-in (spin is part of the cinematic intro)
  if (autoRotate && !isDragging) {
    camTheta += AUTO_ROTATE_RAD * dt;
  }

  // Cinematic zoom-in — runs ONCE at the start of the session
  if (zoomingIn) {
    const t = (performance.now() / 1000 - zoomStartT) / ZOOM_DURATION;
    if (t >= 1) {
      camDistance = ZOOM_TO;
      zoomingIn   = false;
      setTimeout(startWelcome, 350);
    } else {
      // ease-out quartic — fast at start, soft landing
      const e = 1 - Math.pow(1 - t, 4);
      camDistance = ZOOM_FROM + (ZOOM_TO - ZOOM_FROM) * e;
    }
    updateCamera();
  } else if (zoomingHome) {
    // Idle return — ease-in-out cubic, slower than the cinematic intro
    const t = Math.min(1, (performance.now() / 1000 - zoomHomeStartT) / ZOOM_HOME_DURATION);
    const e = t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
    camDistance = zoomHomeStartDist + (ZOOM_TO - zoomHomeStartDist) * e;
    if (t >= 1) { camDistance = ZOOM_TO; zoomingHome = false; }
    updateCamera();
  } else if (autoRotate && !isDragging) {
    updateCamera();
  }

  // Earth: natural daily rotation. The earth mesh sits inside earthGroup
  // (which carries the 23.5° axial tilt), so rotating earthMesh on its
  // LOCAL Y is rotation around the texture's pole axis — guaranteed to
  // pivot through the Arctic and Antarctic. Absolute assignment (no
  // accumulating quaternion drift).
  if (earthMesh) earthMesh.rotation.y = elapsedSim * EARTH_ROT_SPEED;
  if (cloudMesh) cloudMesh.rotation.y = elapsedSim * EARTH_ROT_SPEED * 1.018;

  // Sun: same trick — sunCoreMesh inside the tilted sunGroup, so local
  // Y rotation = real Sun-pole spin axis.
  sunCoreMesh.rotation.y = elapsedSim * SUN_ROT_SPEED;

  // Distance-based Sun visibility — full glow when inside the solar
  // system; fades to nothing when zoomed way out (only skybox remains).
  {
    const rawT = (camDistance - 80000) / (500000 - 80000);
    const sf   = Math.max(0, Math.min(1, 1 - rawT));
    sunSprite.material.opacity          = sf;
    sunHaloSprite.material.opacity      = sf;
    sunCoreSprite.material.opacity      = sf;
    sunRaysSprite.material.opacity      = sf;
    sunBloomSprite.material.opacity     = sf;
    sunInnerHotSprite.material.opacity  = sf;
    sunMegaBloomSprite.material.opacity = sf * 0.65;
    sunCoreMesh.material.opacity        = sf;
  }

  // Moon: natural orbit, no user input.
  moonOrbitY += simDt * MOON_ORB_SPEED;
  moonPivot.rotation.y = moonOrbitY;
  // Tidal lock — moon face always toward Earth
  if (moonMesh) moonMesh.rotation.y = -moonOrbitY;

  // Moon trail
  if (moonMesh) {
    const wp = new THREE.Vector3();
    moonMesh.getWorldPosition(wp);
    trailHistory.unshift(wp.clone());
    if (trailHistory.length > trailCount) trailHistory.pop();
    for (let i = 0; i < trailHistory.length; i++) {
      trailPositions[i*3]   = trailHistory[i].x;
      trailPositions[i*3+1] = trailHistory[i].y;
      trailPositions[i*3+2] = trailHistory[i].z;
    }
    trailGeo.attributes.position.needsUpdate = true;
    trailGeo.setDrawRange(0, trailHistory.length);
    trailLine.material.opacity = 0.12;
  }

  // Planets — circular orbits in eclipticGroup local frame. The planet
  // GROUP carries the axial tilt; the planet MESH spins on local Y, which
  // (because of that tilt on the parent) is the planet's true pole axis.
  // Saturn's ring is a child of the same group, so it follows position
  // and tilt automatically — no separate update needed.
  planetMeshes.forEach((p) => {
    const angle = p.initAngle + elapsedSim * p.angSpeed;
    const lx = p.sunLocal.x + Math.cos(angle) * p.orbitR;
    const lz = p.sunLocal.z + Math.sin(angle) * p.orbitR;
    p.group.position.set(lx, p.sunLocal.y, lz);
    p.mesh.rotation.y = elapsedSim * p.rotSpeed * p.rotDir;
  });

  // Sun glow pulse — handled via sprite, no shader update needed

  // Cosmic events
  tickCosmicEvents(dt);

  // Star twinkle shader time update
  if (starPoints && starPoints.material.uniforms) {
    starPoints.material.uniforms.time.value += dt;
  }

  // Celestial sphere rotates with Earth's orbital position around the Sun
  // 1 full rotation per year (365.25 days) — stars drift as Earth revolves.
  // Initial offset chosen so the galactic-center bulge is visible at page load.
  const EARTH_ORB_SPEED = (2 * Math.PI) / (365.25 * 24 * 3600);
  const SKY_INITIAL_ROT = 0;
  celestialSphere.rotation.y = SKY_INITIAL_ROT + elapsedSim * EARTH_ORB_SPEED;

  renderer.render(scene, camera);
  updateLensFlare();
}

animate();
</script>

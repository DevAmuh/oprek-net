<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>oprek.net</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas { display: block; position: fixed; inset: 0; }

  /* QUOTE — top right */
  #quote {
    position: fixed;
    top: clamp(16px, 4vw, 32px);
    right: clamp(16px, 4vw, 32px);
    z-index: 100;
    max-width: min(280px, calc(100vw - 32px));
    text-align: right;
    pointer-events: none;
    user-select: none;
    opacity: 0;
    transform: translateY(-5px);
  }
  #quote-text {
    font-family: 'Georgia', 'Times New Roman', serif;
    font-size: clamp(11px, 1.4vw, 14px);
    line-height: 1.65;
    color: rgba(255,255,255,0.55);
    font-style: italic;
    letter-spacing: 0.01em;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85), 0 0 14px rgba(0,0,0,0.6);
    transition: opacity 0.7s ease, transform 0.7s ease;
  }
  #quote-author {
    margin-top: 8px;
    font-family: 'Georgia', serif;
    font-size: clamp(9px, 1.1vw, 11px);
    letter-spacing: 0.18em;
    color: rgba(255,255,255,0.35);
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    transition: opacity 0.7s ease;
  }
  #quote.fade { opacity: 0; transform: translateY(-4px); }

  /* NAV — bottom left */
  #nav {
    position: fixed;
    bottom: clamp(20px, 4vw, 32px);
    left: clamp(20px, 4vw, 32px);
    z-index: 100;
  }
  #nav-toggle {
    background: none;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 0;
    min-height: 44px;
    color: rgba(255,255,255,0.55);
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    transition: color 0.3s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #nav-toggle:hover { color: rgba(255,255,255,0.9); }
  #nav-toggle .hamburger {
    width: 22px;
    height: 16px;
    position: relative;
    flex-shrink: 0;
  }
  #nav-toggle .hamburger span {
    position: absolute;
    left: 0; right: 0;
    height: 1px;
    background: currentColor;
    transition: transform 0.3s ease, opacity 0.3s ease;
  }
  #nav-toggle .hamburger span:nth-child(1) { top: 0; }
  #nav-toggle .hamburger span:nth-child(2) { top: 50%; transform: translateY(-50%); }
  #nav-toggle .hamburger span:nth-child(3) { bottom: 0; }
  #nav-toggle.open .hamburger span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
  #nav-toggle.open .hamburger span:nth-child(2) { opacity: 0; transform: translateY(-50%) scaleX(0); }
  #nav-toggle.open .hamburger span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
  #nav-toggle .nav-label {
    font-family: 'Georgia', serif;
    font-size: clamp(11px, 2.5vw, 13px);
    letter-spacing: 0.25em;
    text-transform: uppercase;
  }
  #nav-links {
    margin-top: 12px;
    margin-left: 2px;
    padding-left: 16px;
    border-left: 1px solid rgba(255,255,255,0.1);
    display: flex;
    flex-direction: column;
    gap: 0;
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    transition: max-height 0.4s ease, opacity 0.4s ease;
  }
  #nav-links.open { max-height: 160px; opacity: 1; }
  #nav-links a {
    font-family: 'Georgia', serif;
    font-size: clamp(11px, 2.5vw, 13px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.5);
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    text-decoration: none;
    transition: color 0.25s, transform 0.25s;
    display: inline-block;
    padding: 4px 0;
    min-height: 44px;
    display: flex;
    align-items: center;
  }
  #nav-links a:hover { color: rgba(255,255,255,0.95); transform: translateX(5px); }

  /* DRAG HINT — sits between menu button and Earth */
  #hint {
    position: fixed;
    bottom: clamp(70px, 12vw, 100px);
    left: clamp(20px, 4vw, 32px);
    z-index: 10;
    font-family: 'Georgia', serif;
    font-size: clamp(9px, 2.2vw, 11px);
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    pointer-events: none;
    transition: opacity 1.5s ease;
    max-width: calc(50vw - 24px);
    line-height: 1.6;
  }
  #hint.hidden { opacity: 0; }

  /* VERTICAL EDGE TOGGLES — sky on the right (reads bottom-to-top, CCW),
     orbits on the left (reads top-to-bottom, CW). They're geometric
     mirrors of each other across the screen's vertical center line.
     Hidden by default; revealed by clicking their ‹ / › handle. */
  #sky-toggle, #orbit-toggle {
    position: fixed;
    top: 50%;
    z-index: 100;
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: 'Georgia', serif;
    font-size: clamp(10px, 2.2vw, 12px);
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    white-space: nowrap;
    transition: transform 0.32s cubic-bezier(0.22, 1, 0.36, 1), opacity 0.25s ease;
  }
  #sky-toggle {
    right: clamp(4px, 1.2vw, 14px);
    transform: translateY(-50%) translateX(0);
    writing-mode: sideways-lr; /* CCW: bottom-to-top */
  }
  #sky-toggle.hidden {
    transform: translateY(-50%) translateX(140%);
    opacity: 0;
    pointer-events: none;
  }
  #orbit-toggle {
    left: clamp(4px, 1.2vw, 14px);
    transform: translateY(-50%) translateX(0);
    writing-mode: sideways-rl; /* CW: top-to-bottom */
  }
  #orbit-toggle.hidden {
    transform: translateY(-50%) translateX(-140%);
    opacity: 0;
    pointer-events: none;
  }

  /* Edge HANDLES (‹ / ›) — always visible, click to slide the matching
     toggle in or out. Sleek serif chevron, large enough for a tap. */
  #sky-toggle-handle, #orbit-toggle-handle {
    position: fixed;
    top: 50%;
    transform: translateY(-50%);
    z-index: 101;
    background: none;
    border: none;
    cursor: pointer;
    color: rgba(255,255,255,0.35);
    font-family: 'Georgia', serif;
    font-size: clamp(20px, 3vw, 26px);
    line-height: 1;
    padding: 14px 12px;
    min-width: 44px;
    min-height: 44px;
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    transition: color 0.2s ease, transform 0.2s ease;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  #sky-toggle-handle:hover, #orbit-toggle-handle:hover {
    color: rgba(255,255,255,0.85);
  }
  #sky-toggle-handle   { right: clamp(2px, 0.6vw, 8px); }
  #orbit-toggle-handle { left:  clamp(2px, 0.6vw, 8px); }
  #sky-toggle .opt, #orbit-toggle .opt {
    cursor: pointer;
    color: rgba(255,255,255,0.32);
    transition: color 0.25s ease;
    padding: 10px 6px;
    min-height: 44px;
    display: flex;
    align-items: center;
    touch-action: manipulation;
  }
  #sky-toggle .opt:hover, #orbit-toggle .opt:hover { color: rgba(255,255,255,0.7); }
  #sky-toggle .opt.active, #orbit-toggle .opt.active { color: rgba(255,255,255,0.95); }
  #sky-toggle .sep, #orbit-toggle .sep {
    color: rgba(255,255,255,0.18);
    font-size: 0.8em;
    pointer-events: none;
  }
  #sky-toggle .loading {
    width: 9px;
    height: 9px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.4);
    border-top-color: rgba(255,255,255,0.9);
    margin-left: 6px;
    animation: sky-spin 0.9s linear infinite;
    display: none;
  }
  #sky-toggle.loading .loading { display: inline-block; }
  @keyframes sky-spin { to { transform: rotate(360deg); } }

  /* Sun handled entirely in WebGL — no CSS overlay needed */
  #time-indicator {
    position: fixed;
    bottom: clamp(20px, 4vw, 32px);
    right: clamp(20px, 4vw, 32px);
    z-index: 10;
    font-family: 'Georgia', serif;
    font-size: clamp(9px, 2vw, 11px);
    letter-spacing: 0.16em;
    color: rgba(255,255,255,0.3);
    text-shadow: 0 1px 6px rgba(0,0,0,0.85);
    text-transform: uppercase;
    pointer-events: none;
    text-align: right;
    transition: color 0.5s;
  }
  #time-indicator.active { color: rgba(255,255,255,0.6); }
</style>
</head>
<body>

<!-- QUOTE -->
<div id="quote">
  <div id="quote-text"></div>
  <div id="quote-author"></div>
</div>

<!-- NAV -->
<nav id="nav">
  <button id="nav-toggle" aria-label="Menu" aria-expanded="false">
    <span class="hamburger">
      <span></span><span></span><span></span>
    </span>
    <span class="nav-label">MENU</span>
  </button>
  <div id="nav-links" role="menu">
    <a href="/english" role="menuitem">english class</a>
    <a href="/lab" role="menuitem">lab</a>
  </div>
</nav>

<!-- DRAG HINT -->
<div id="hint">DRAG EARTH OR MOON<br>TO ACCELERATE TIME</div>

<!-- TIME INDICATOR -->
<div id="time-indicator">1h = 1s</div>

<!-- SKY TOGGLE (right edge, hidden by default — show via the ‹ handle) -->
<div id="sky-toggle" class="hidden" role="group" aria-label="Sky mode">
  <span class="opt active" data-mode="stars" role="button" tabindex="0">Artificial</span>
  <span class="sep">·</span>
  <span class="opt" data-mode="nature" role="button" tabindex="0">Natural</span>
  <span class="loading" aria-hidden="true"></span>
</div>
<button id="sky-toggle-handle" type="button" aria-label="Show or hide sky-mode toggle" aria-expanded="false">‹</button>

<!-- ORBITS TOGGLE (left edge, hidden by default — show via the › handle) -->
<div id="orbit-toggle" class="hidden" role="group" aria-label="Orbit paths">
  <span class="opt active" data-orbits="off" role="button" tabindex="0">Off</span>
  <span class="sep">·</span>
  <span class="opt" data-orbits="on" role="button" tabindex="0">Orbits</span>
</div>
<button id="orbit-toggle-handle" type="button" aria-label="Show or hide orbit toggle" aria-expanded="false">›</button>

<!-- THREE.JS -->
<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>

<script>
// ============================================================
// QUOTES
// ============================================================
const QUOTES = [
  { text: "The more I learn, the more I realize how much I don't know.", author: "Albert Einstein" },
  { text: "Live as if you were to die tomorrow. Learn as if you were to live forever.", author: "Mahatma Gandhi" },
  { text: "Education is not the filling of a pail, but the lighting of a fire.", author: "W.B. Yeats" },
  { text: "The beautiful thing about learning is that no one can take it away from you.", author: "B.B. King" },
  { text: "Curiosity is the wick in the candle of learning.", author: "William Arthur Ward" },
  { text: "The mind is not a vessel to be filled, but a fire to be kindled.", author: "Plutarch" },
  { text: "Anyone who stops learning is old, whether at twenty or eighty.", author: "Henry Ford" },
  { text: "I am still learning.", author: "Michelangelo" },
  { text: "The only true wisdom is in knowing you know nothing.", author: "Socrates" },
  { text: "Tell me and I forget. Teach me and I remember. Involve me and I learn.", author: "Benjamin Franklin" },
  { text: "Learning never exhausts the mind.", author: "Leonardo da Vinci" },
  { text: "An investment in knowledge pays the best interest.", author: "Benjamin Franklin" },
  { text: "The more that you read, the more things you will know.", author: "Dr. Seuss" },
  { text: "Wonder is the beginning of wisdom.", author: "Socrates" },
  { text: "In learning you will teach, and in teaching you will learn.", author: "Phil Collins" },
  { text: "Knowledge is of no value unless you put it into practice.", author: "Anton Chekhov" },
];

let currentQuoteIdx = Math.floor(Math.random() * QUOTES.length);
const quoteEl = document.getElementById('quote');
const quoteText = document.getElementById('quote-text');
const quoteAuthor = document.getElementById('quote-author');

function showQuote(idx, animate = false) {
  const q = QUOTES[idx];
  if (animate) {
    quoteEl.style.opacity = '0';
    quoteEl.style.transform = 'translateY(-5px)';
    setTimeout(() => {
      quoteText.textContent = '\u201c' + q.text + '\u201d';
      quoteAuthor.textContent = '— ' + q.author;
      quoteEl.style.transition = 'opacity 1s ease, transform 1s ease';
      quoteEl.style.opacity = '1';
      quoteEl.style.transform = 'translateY(0)';
    }, 700);
  } else {
    quoteText.textContent = '\u201c' + q.text + '\u201d';
    quoteAuthor.textContent = '— ' + q.author;
    quoteEl.style.opacity = '0';
    quoteEl.style.transform = 'translateY(-5px)';
    setTimeout(() => {
      quoteEl.style.transition = 'opacity 1.5s ease, transform 1.5s ease';
      quoteEl.style.opacity = '1';
      quoteEl.style.transform = 'translateY(0)';
    }, 100);
  }
}

showQuote(currentQuoteIdx);
setInterval(() => {
  currentQuoteIdx = (currentQuoteIdx + 1) % QUOTES.length;
  showQuote(currentQuoteIdx, true);
}, 12000);

// ============================================================
// NAV
// ============================================================
const navToggle = document.getElementById('nav-toggle');
const navLinks = document.getElementById('nav-links');
let navOpen = false;

navToggle.addEventListener('click', (e) => {
  e.stopPropagation();
  navOpen = !navOpen;
  navToggle.classList.toggle('open', navOpen);
  navLinks.classList.toggle('open', navOpen);
  navToggle.setAttribute('aria-expanded', navOpen);
});

document.addEventListener('click', () => {
  if (navOpen) {
    navOpen = false;
    navToggle.classList.remove('open');
    navLinks.classList.remove('open');
    navToggle.setAttribute('aria-expanded', false);
  }
});

// HINT
const hintEl = document.getElementById('hint');
setTimeout(() => { hintEl.classList.add('hidden'); }, 5000);

// ============================================================
// SCENE SETUP
// ============================================================
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 5000);

// ============================================================
// ORBIT CAMERA — Earth stays at world origin; the camera flies on a
// sphere around it. Drag anywhere on the canvas to pan the perspective;
// scroll/pinch dollies in and out. Spherical coords:
//   camDistance  — radius from origin
//   camTheta     — azimuth (around world Y axis), 0 = camera at +Z
//   camPhi       — polar angle from world +Y, π/2 = looking from equator
// ============================================================
// Defaults are pulled in close because Earth is now small (radius 0.25).
// At camDistance=5 Earth fills a comfortable portion of the view; user
// can zoom out to see the planets on their orbits.
let camDistance = window.innerWidth < window.innerHeight ? 6 : 5;
let camTheta    = 0.06;        // tiny offset so camera is barely off the +Z axis
let camPhi      = 1.48;        // ≈ 84.8° from +Y → roughly looking from the equator

function updateCamera() {
  const sinPhi = Math.sin(camPhi);
  camera.position.set(
    camDistance * sinPhi * Math.sin(camTheta),
    camDistance * Math.cos(camPhi),
    camDistance * sinPhi * Math.cos(camTheta)
  );
  camera.lookAt(0, 0, 0);
}
updateCamera();

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  // Don't touch camera.position.z on resize — the user owns it via
  // mousewheel/pinch zoom and we don't want to wipe their setting.
});

// ============================================================
// LIGHTING
// ============================================================
// Ambient — slightly warmer so Earth's daylit face is always visible
scene.add(new THREE.AmbientLight(0x223355, 0.7));

// Sun light matches visual position (upper-left)
const sunLight = new THREE.DirectionalLight(0xfff5e0, 3.0);
sunLight.position.set(-7, 6, -5);
scene.add(sunLight);

// Subtle camera fill — ensures the Earth face toward viewer is never pitch black
const camFill = new THREE.DirectionalLight(0x334466, 0.35);
camFill.position.set(0, 0, 10);
scene.add(camFill);

// Earthshine fill from below
const fillLight = new THREE.DirectionalLight(0x1a3060, 0.2);
fillLight.position.set(4, -3, 6);
scene.add(fillLight);

// ============================================================
// TEXTURE LOADER
// ============================================================
const loader = new THREE.TextureLoader();
loader.crossOrigin = 'anonymous';

function loadTex(url, fallbackColor) {
  return new Promise((resolve) => {
    loader.load(url, resolve, undefined, () => {
      // on error, return null so we fall back gracefully
      resolve(null);
    });
  });
}

// ============================================================
// CELESTIAL SPHERE — stars + nebulae fixed in this group
// Rotates with Earth's orbital position (parallax / star drift)
// 1 full revolution per Earth year = 365.25 * 24 * 3600 sim-seconds
// ============================================================
const celestialSphere = new THREE.Group();
scene.add(celestialSphere);

function buildStarField() {
  // ── STARS ──────────────────────────────────────────────────────────────
  // Reference: NuSTAR deep field — sparse, mostly tiny colored dots,
  // few bright blue stars with soft halos, not crowded.
  // Two layers: (1) dim background dots, (2) bright foreground stars with glow sprites

  const BG_COUNT = 2000; // background dots filling the entire celestial sphere
  const bgPos = new Float32Array(BG_COUNT * 3);
  const bgCol = new Float32Array(BG_COUNT * 3);
  const bgSz  = new Float32Array(BG_COUNT);
  // Per-star twinkle phase stored as extra attrib
  const bgPhase = new Float32Array(BG_COUNT);

  for (let i = 0; i < BG_COUNT; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 400 + Math.random() * 500;
    bgPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    bgPos[i*3+1] = r * Math.sin(phi) * Math.sin(theta);
    bgPos[i*3+2] = r * Math.cos(phi);

    // Realistic stellar color distribution — mostly white-yellow, some warm
    // reds, a few hot blue-whites. Tuned brighter than before since the prior
    // colors were paired with a broken attribute name (rendered as black).
    const t = Math.random();
    if (t < 0.55) {
      // white / pale-yellow (most common — sun-like)
      const k = 0.85 + Math.random() * 0.15;
      bgCol[i*3]=k; bgCol[i*3+1]=k*(0.92+Math.random()*0.08); bgCol[i*3+2]=k*(0.85+Math.random()*0.1);
    } else if (t < 0.78) {
      // warm yellow-orange (K-type)
      bgCol[i*3]=0.95+Math.random()*0.05; bgCol[i*3+1]=0.78+Math.random()*0.15; bgCol[i*3+2]=0.45+Math.random()*0.2;
    } else if (t < 0.90) {
      // red-orange (red giants / M-type)
      bgCol[i*3]=0.95+Math.random()*0.05; bgCol[i*3+1]=0.55+Math.random()*0.2; bgCol[i*3+2]=0.35+Math.random()*0.15;
    } else {
      // blue-white (hot young O/B-type)
      bgCol[i*3]=0.7+Math.random()*0.2; bgCol[i*3+1]=0.85+Math.random()*0.15; bgCol[i*3+2]=1.0;
    }
    bgSz[i] = 0.6 + Math.random() * 1.2;
    bgPhase[i] = Math.random() * Math.PI * 2;
  }

  const bgGeo = new THREE.BufferGeometry();
  bgGeo.setAttribute('position',   new THREE.BufferAttribute(bgPos,   3));
  bgGeo.setAttribute('aStarColor', new THREE.BufferAttribute(bgCol,   3));
  bgGeo.setAttribute('aSize',      new THREE.BufferAttribute(bgSz,    1));
  bgGeo.setAttribute('aPhase',     new THREE.BufferAttribute(bgPhase, 1));

  // Custom shader material for twinkling.
  // FIX: previous version declared `attribute vec3 starColor;` while the
  // geometry attribute was named `color` — names didn't match so colors
  // came in as zero (black on black, invisible). Renamed every attribute to
  // unambiguous `aStarColor`/`aSize`/`aPhase` to avoid any clash with
  // Three.js's built-ins (`color`, `size`).
  const bgMat = new THREE.ShaderMaterial({
    uniforms: { time: { value: 0 } },
    vertexShader: `
      attribute vec3 aStarColor;
      attribute float aSize;
      attribute float aPhase;
      uniform float time;
      varying vec3 vColor;
      varying float vTwinkle;
      void main() {
        vColor = aStarColor;
        float freq = 0.8 + fract(aPhase * 7.3) * 1.4;
        vTwinkle = 0.72 + 0.28 * sin(time * freq + aPhase);
        vec4 mv = modelViewMatrix * vec4(position, 1.0);
        // Stars sit at 400–900 units; the multiplier converts world-size to
        // screen pixels at typical depths. ~2000 gives 1.5–4.5 px points.
        gl_PointSize = aSize * (2000.0 / -mv.z) * vTwinkle;
        gl_Position = projectionMatrix * mv;
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vTwinkle;
      void main() {
        float d = length(gl_PointCoord - 0.5) * 2.0;
        float alpha = smoothstep(1.0, 0.05, d) * vTwinkle;
        if (alpha < 0.01) discard;
        gl_FragColor = vec4(vColor * vTwinkle, alpha);
      }
    `,
    transparent: true,
    blending: THREE.AdditiveBlending,
    depthWrite: false,
  });

  const bgStars = new THREE.Points(bgGeo, bgMat);
  celestialSphere.add(bgStars);

  // Bright foreground stars — canvas sprite blobs (like the blue halos in NuSTAR)
  // ~12 prominent stars scattered around
  const brightStarData = [
    {r:320, theta:0.8,  phi:1.2, size:6,  col:'rgba(140,200,255,'},  // blue
    {r:350, theta:2.1,  phi:0.7, size:5,  col:'rgba(160,210,255,'},
    {r:380, theta:3.5,  phi:1.8, size:4.5,col:'rgba(120,190,255,'},
    {r:360, theta:5.0,  phi:0.9, size:5.5,col:'rgba(150,205,255,'},
    {r:400, theta:1.4,  phi:2.4, size:4,  col:'rgba(255,240,180,'},  // warm yellow
    {r:340, theta:4.2,  phi:1.5, size:4,  col:'rgba(255,220,140,'},
    {r:370, theta:0.3,  phi:2.8, size:3.5,col:'rgba(255,180,120,'},  // orange
    {r:410, theta:2.8,  phi:0.4, size:4,  col:'rgba(130,195,255,'},  // blue
    {r:330, theta:6.0,  phi:1.1, size:5,  col:'rgba(145,202,255,'},
    {r:390, theta:3.0,  phi:2.1, size:3.5,col:'rgba(255,255,220,'},  // white
    {r:355, theta:1.8,  phi:3.0, size:4.5,col:'rgba(140,200,255,'},
    {r:420, theta:4.8,  phi:2.0, size:3,  col:'rgba(255,200,150,'},
  ];

  // Build a star glow canvas texture
  function makeStarTex(col, size) {
    const s = Math.ceil(size * 24);
    const nc = document.createElement('canvas');
    nc.width = s * 2; nc.height = s * 2;
    const ctx = nc.getContext('2d');
    // Diffuse halo
    const halo = ctx.createRadialGradient(s,s,0, s,s,s);
    halo.addColorStop(0,   col + '0.35)');
    halo.addColorStop(0.4, col + '0.12)');
    halo.addColorStop(0.8, col + '0.03)');
    halo.addColorStop(1,   col + '0)');
    ctx.fillStyle = halo; ctx.fillRect(0,0,s*2,s*2);
    // Bright core
    const core = ctx.createRadialGradient(s,s,0, s,s,s*0.18);
    core.addColorStop(0, 'rgba(255,255,255,0.95)');
    core.addColorStop(1, col + '0.5)');
    ctx.fillStyle = core; ctx.beginPath(); ctx.arc(s,s,s*0.22,0,Math.PI*2); ctx.fill();
    return new THREE.CanvasTexture(nc);
  }

  brightStarData.forEach(({ r, theta, phi: p, size, col }) => {
    const x = r * Math.sin(p) * Math.cos(theta);
    const y = r * Math.sin(p) * Math.sin(theta);
    const z = r * Math.cos(p);
    const tex = makeStarTex(col, size);
    const mat = new THREE.SpriteMaterial({
      map: tex, transparent: true, blending: THREE.AdditiveBlending,
      depthTest: false, depthWrite: false
    });
    const sp = new THREE.Sprite(mat);
    sp.position.set(x, y, z);
    sp.scale.setScalar(size * 5);
    celestialSphere.add(sp);
  });

  return bgStars; // return for animation loop reference
}

// 6000×3000 ESO/Brunier 360° panorama. Galactic bulge, dust lanes,
// Magellanic Clouds, Andromeda, and naked-eye nebulae are baked in
// at real sky positions. Wrapped on an inverted sphere and tilted so
// the galactic poles sit on world ±Y (out of camera FOV) — kills the
// equirectangular pole-singularity "vortex" that appears at high tilts.
const SKY_HD_LOCAL = 'assets/milkyway-hd.jpg';
const SKY_HD_CDN   = 'https://upload.wikimedia.org/wikipedia/commons/6/60/ESO_-_Milky_Way.jpg';
const SKY_LD_LOCAL = 'assets/milkyway.jpg';
const SKY_LD_CDN   = 'https://upload.wikimedia.org/wikipedia/commons/thumb/6/60/ESO_-_Milky_Way.jpg/3840px-ESO_-_Milky_Way.jpg';

let skyTilt = null;
let skyTexCache = null;
let skyLoading = false;

async function ensureNatureSky() {
  if (skyTilt || skyLoading) return;
  skyLoading = true;
  document.getElementById('sky-toggle').classList.add('loading');
  try {
    if (!skyTexCache) {
      skyTexCache =
        (await loadTex(SKY_HD_LOCAL)) ||
        (await loadTex(SKY_HD_CDN))   ||
        (await loadTex(SKY_LD_LOCAL)) ||
        (await loadTex(SKY_LD_CDN));
      if (!skyTexCache) return; // all sources failed; procedural stars carry on
      skyTexCache.colorSpace = THREE.SRGBColorSpace;
      skyTexCache.anisotropy = renderer.capabilities.getMaxAnisotropy();
    }
    skyTilt = new THREE.Group();
    // X=0 so galactic poles stay on world Y axis (vertical, off-screen) —
    // no equirectangular pole singularity in the camera's view.
    // Y=π/2 puts the galactic-center bulge directly in front of camera.
    // Z=28° tilts the band into a pleasing diagonal across the screen.
    skyTilt.rotation.set(0, Math.PI / 2, THREE.MathUtils.degToRad(28));

    const skyMesh = new THREE.Mesh(
      new THREE.SphereGeometry(1500, 64, 32),
      new THREE.MeshBasicMaterial({
        map: skyTexCache,
        side: THREE.BackSide,
        depthWrite: false,
        // Warm-gray multiplier — long-exposure feel, lets dust lanes pop
        color: 0xc8c2b2,
        toneMapped: false,
      })
    );
    skyMesh.renderOrder = -1;
    skyTilt.add(skyMesh);
    celestialSphere.add(skyTilt);
  } finally {
    skyLoading = false;
    document.getElementById('sky-toggle').classList.remove('loading');
  }
}

function removeNatureSky() {
  if (!skyTilt) return;
  const mesh = skyTilt.children[0];
  celestialSphere.remove(skyTilt);
  if (mesh) {
    mesh.geometry.dispose();
    mesh.material.dispose();
  }
  skyTilt = null;
}

// Distances are in AU (compressed for outer planets so they all fit

// Real sidereal rotation periods kept (Mercury slow, Jupiter fast,
// Venus retrograde).
// r     = body radius in scene units. ALL bodies are now strictly
//         proportional: Earth = 0.25, every other planet/Moon scaled
//         by its REAL radius ratio to Earth (Mercury 0.38×, Venus 0.95×,
//         Mars 0.53×, Jupiter 11.21×, Saturn 9.45×, Moon 0.273×). The
//         Sun is the only exception — it would need radius 27.3 at this
//         scale (109× Earth = 109 × 0.25), which would swallow Earth's
//         orbit; instead the Sun sphere is set to 4 below, making it
//         visibly the biggest body without breaking the scene.
// dist  = orbital radius in AU — REAL ratios (Mercury 0.39, Venus 0.72,
//         Earth 1.00, Mars 1.52, Jupiter 5.20, Saturn 9.54).
// theta = initial orbital phase (radians) — spreads the planets across
//         the visible part of the scene at page load.
const PLANET_DATA = [
  { name:'Mercury', r:0.095, dist:0.39, theta: 0.6,  color:0xb5b5b5, period:88,    rotDays: 58.6  },
  { name:'Venus',   r:0.238, dist:0.72, theta:-0.9,  color:0xE6C87A, period:225,   rotDays:-243.0 },
  { name:'Mars',    r:0.133, dist:1.52, theta: 1.6,  color:0xC1440E, period:687,   rotDays: 1.026 },
  { name:'Jupiter', r:2.80,  dist:5.20, theta:-2.1,  color:0xC9A86C, period:4333,  rotDays: 0.413 },
  { name:'Saturn',  r:2.36,  dist:9.54, theta: 2.4,  color:0xE3D5A8, period:10759, rotDays: 0.444, rings:true },
];

const planetMeshes = [];

PLANET_DATA.forEach((p) => {
  const mesh = new THREE.Mesh(
    new THREE.SphereGeometry(p.r, 20, 20),
    new THREE.MeshStandardMaterial({
      color: p.color, roughness: 0.85, metalness: 0.05,
      emissive: new THREE.Color(p.color).multiplyScalar(0.08),
    })
  );
  const orbitR = p.dist * AU;
  // Place on circular orbit at angle theta, in the eclipticGroup local
  // XZ plane — every planet at LOCAL y = SUN_LOCAL.y, guaranteeing
  // strict coplanarity with the Sun and Earth.
  mesh.position.set(
    SUN_LOCAL.x + orbitR * Math.cos(p.theta),
    SUN_LOCAL.y,
    SUN_LOCAL.z + orbitR * Math.sin(p.theta)
  );
  eclipticGroup.add(mesh);

  // Saturn's ring — sibling of the planet mesh so it keeps its fixed
  // 26.7° tilt instead of inheriting the planet's spin.
  let ringMesh = null;
  if (p.rings) {
    const rGeo = new THREE.RingGeometry(p.r * 1.5, p.r * 2.4, 64);
    const rMat = new THREE.MeshBasicMaterial({
      color: 0xC9B896, transparent: true, opacity: 0.55, side: THREE.DoubleSide,
    });
    ringMesh = new THREE.Mesh(rGeo, rMat);
    ringMesh.rotation.x = Math.PI / 2 - 26.7 * (Math.PI / 180);
    ringMesh.position.copy(mesh.position);
    eclipticGroup.add(ringMesh);
  }

  const angSpeed = (2 * Math.PI) / (p.period * 24 * 3600);
  const rotSpeed = (2 * Math.PI) / (Math.abs(p.rotDays) * 24 * 3600);
  const rotDir   = p.rotDays < 0 ? -1 : 1; // Venus retrograde

  planetMeshes.push({
    mesh, ringMesh, angSpeed, rotSpeed, rotDir,
    initAngle: p.theta, orbitR, sunLocal: SUN_LOCAL,
  });
});

// ORBIT PATHS — Earth + every planet + Moon, controlled by the left
// ORBITS toggle. Uses RingGeometry (a thin disc-ring) instead of
// LineLoop so the ring has guaranteed visible thickness regardless of
// GPU/driver line-width support.
// ============================================================
const orbitMeshes = [];

function makeOrbitRing(radius, opacity, color = 0x6b7898, thicknessFrac = 0.005) {
  const t = Math.max(0.005, radius * thicknessFrac);
  const geo = new THREE.RingGeometry(radius - t, radius + t, 256);
  // RingGeometry sits in XY plane by default — flip to XZ
  geo.rotateX(-Math.PI / 2);
  const mat = new THREE.MeshBasicMaterial({
    color, transparent: true, opacity,
    side: THREE.DoubleSide, depthWrite: false,
  });
  return new THREE.Mesh(geo, mat);
}

// Earth's own orbit around the Sun — a full ring of radius AU centered
// on the Sun, lying in the ecliptic. Earth itself stays at scene origin
// (one fixed point on this ring, since this is the camera-fixed view).
{
  const ring = makeOrbitRing(AU, 0.55, 0x9aaad0);
  ring.position.copy(SUN_LOCAL);
  ring.visible = false;
  eclipticGroup.add(ring);
  orbitMeshes.push(ring);
}

  const ring = makeOrbitRing(p.orbitR, 0.40);
  ring.position.copy(p.sunLocal);
  ring.visible = false;
  eclipticGroup.add(ring);
  orbitMeshes.push(ring);
});

  geo.setFromPoints(pts);

  const brightness = 0.7 + Math.random() * 0.3;
  const mat = new THREE.LineBasicMaterial({
    color: new THREE.Color(brightness, brightness * 0.95, brightness * 0.85),
    transparent: true, opacity: 0.9
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  cosmicObjects.push({
    type: 'meteor', mesh: line, mat,
    velocity: dir.clone().multiplyScalar(0.35 + Math.random() * 0.25),
    life: 0, maxLife: 0.6 + Math.random() * 0.4
  });
}

// Comet (longer trail, slower)
function spawnComet() {
  const trailLen = 6 + Math.random() * 8;
  const dir = new THREE.Vector3(
    (Math.random() - 0.5) * 0.8,
    -0.2 - Math.random() * 0.3,
    (Math.random() - 0.5) * 0.5
  ).normalize();

  const start = new THREE.Vector3(
    (Math.random() - 0.5) * 50,
    12 + Math.random() * 10,
    -20 + Math.random() * 15
  );

  const pts = [];
  for (let i = 0; i <= 20; i++) {
    pts.push(start.clone().addScaledVector(dir, (i / 20) * trailLen));
  }
  const geo = new THREE.BufferGeometry().setFromPoints(pts);

  // Gradient-ish via vertex colors workaround: just use a very bright line
  const mat = new THREE.LineBasicMaterial({
    color: 0xccddff, transparent: true, opacity: 0.75
  });
  const line = new THREE.Line(geo, mat);
  scene.add(line);

  // Nucleus
  const nucleusMat = new THREE.MeshBasicMaterial({ color: 0xeeeeff });
  const nucleus = new THREE.Mesh(new THREE.SphereGeometry(0.08, 8, 8), nucleusMat);
  nucleus.position.copy(pts[pts.length - 1]);
  scene.add(nucleus);

  cosmicObjects.push({
    type: 'comet', mesh: line, mat, nucleus,
    velocity: dir.clone().multiplyScalar(0.06 + Math.random() * 0.04),
    life: 0, maxLife: 8 + Math.random() * 6
  });
}

// Asteroid (small dot tumbling across)
function spawnAsteroid() {
  const mat = new THREE.MeshBasicMaterial({ color: 0x887766, transparent: true, opacity: 0.85 });
  const mesh = new THREE.Mesh(new THREE.SphereGeometry(0.06 + Math.random() * 0.08, 6, 6), mat);
  mesh.position.set(
    (Math.random() - 0.5) * 40,
    5 + Math.random() * 8,
    -10 + Math.random() * 10
  );
  scene.add(mesh);

  const vel = new THREE.Vector3(
    (Math.random() - 0.5) * 0.12,
    -0.03 - Math.random() * 0.04,
    (Math.random() - 0.5) * 0.06
  );

  cosmicObjects.push({
    type: 'asteroid', mesh, mat,
    velocity: vel,
    rotSpeed: new THREE.Vector3(Math.random() * 0.05, Math.random() * 0.05, Math.random() * 0.05),
    life: 0, maxLife: 10 + Math.random() * 8
  });
}

// Aurora removed — was misleading visually

// Probabilities per frame at ~60fps
const EVENT_PROB = {
  meteor:   0.004,
  comet:    0.00008,
  asteroid: 0.0005,

};

function tickCosmicEvents(dt) {
  // Don't spawn new events while user is dragging
  if (!isDragging) {
    const r = Math.random();
    if (r < EVENT_PROB.meteor)   spawnMeteor();
    if (r < EVENT_PROB.comet)    spawnComet();
    if (r < EVENT_PROB.asteroid) spawnAsteroid();
  }

  // Still tick existing events to let them finish gracefully

  for (let i = cosmicObjects.length - 1; i >= 0; i--) {
    const obj = cosmicObjects[i];
    obj.life += dt;
    const t = obj.life / obj.maxLife; // 0→1

    if (obj.type === 'meteor') {
      obj.mesh.position.addScaledVector(obj.velocity, dt * 60);
      obj.mat.opacity = t < 0.3 ? t / 0.3 : (1 - (t - 0.3) / 0.7);
      obj.mat.opacity *= 0.9;
      if (t >= 1) { scene.remove(obj.mesh); obj.mesh.geometry.dispose(); cosmicObjects.splice(i, 1); }
    }

    if (obj.type === 'comet') {
      obj.mesh.position.addScaledVector(obj.velocity, dt * 60);
      obj.nucleus.position.addScaledVector(obj.velocity, dt * 60);
      obj.mat.opacity = t < 0.1 ? t / 0.1 * 0.75 : t > 0.8 ? (1 - t) / 0.2 * 0.75 : 0.75;
      if (t >= 1) { scene.remove(obj.mesh); scene.remove(obj.nucleus); cosmicObjects.splice(i, 1); }
    }

    if (obj.type === 'asteroid') {
      obj.mesh.position.addScaledVector(obj.velocity, dt * 60);
      obj.mesh.rotation.x += obj.rotSpeed.x;
      obj.mesh.rotation.y += obj.rotSpeed.y;
      obj.mat.opacity = t < 0.1 ? t / 0.1 * 0.85 : t > 0.85 ? (1 - t) / 0.15 * 0.85 : 0.85;
      if (t >= 1) { scene.remove(obj.mesh); cosmicObjects.splice(i, 1); }
    }


  }
}

// ============================================================
// INTERACTION — drag anywhere to orbit the camera around Earth
// ============================================================
// Earth (and the Moon, the planets, the sky) all run on their own
// natural rotations every frame, untouched by user input. The user
// only controls the camera: drag pans the orbit angle, wheel/pinch
// zooms in and out.
const TIME_RATE = 3600;     // 1 real-second = 1 sim-hour (fixed)

let isDragging = false;
let lastDragX  = 0;
let lastDragY  = 0;

// Earth's spin axis in world coords — tilted 23.5° around Z (Polaris-like)
const EARTH_AXIS = new THREE.Vector3(0, 1, 0).applyEuler(
  new THREE.Euler(0, 0, 23.5 * Math.PI / 180)
).normalize();

// Moon's orbit accumulator (no longer driven by the user)
let moonOrbitY = 0;

// Cursor → camera rotation sensitivity (radians per pixel). Tuned so a
// full screen-width drag is roughly 180° of orbit.
const ORBIT_K = 0.005;

const timeIndicator = document.getElementById('time-indicator');

// Project a world Vector3 to screen pixel coords
function worldToScreen(v3) {
  const v = v3.clone().project(camera);
  return {
    x: (v.x *  0.5 + 0.5) * window.innerWidth,
    y: (v.y * -0.5 + 0.5) * window.innerHeight,
  };
}

// Check if screen point (px,py) is within radius of a world position
function nearObject(px, py, worldPos, radiusPx) {
  const s = worldToScreen(worldPos);
  const dx = px - s.x, dy = py - s.y;
  return Math.sqrt(dx*dx + dy*dy) < radiusPx;
}

function getXY(e) {
  if (e.touches && e.touches.length > 0) {
    return { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
  return { x: e.clientX, y: e.clientY };
}

function onPointerDown(e) {
  // Ignore second/third fingers — those are pinch-zoom, not drag
  if (e.touches && e.touches.length >= 2) return;
  const { x, y } = getXY(e);

  isDragging = true;
  lastDragX = x;
  lastDragY = y;
  renderer.domElement.style.cursor = 'grabbing';
  // Clear active cosmic events so they don't fly past at warp during the orbit
  for (let i = cosmicObjects.length - 1; i >= 0; i--) {
    const obj = cosmicObjects[i];
    scene.remove(obj.mesh);
    if (obj.nucleus) scene.remove(obj.nucleus);
  }
  cosmicObjects.length = 0;
  e.preventDefault();
}

function onPointerMove(e) {
  if (!isDragging) return;
  const { x, y } = getXY(e);
  const dx = x - lastDragX;
  const dy = y - lastDragY;
  lastDragX = x;
  lastDragY = y;

  // Drag → orbit camera around Earth. Sign convention matches Three.js
  // OrbitControls: drag right → world appears to follow finger right
  // (camera swings opposite). Polar angle clamped to avoid pole flip.
  camTheta -= dx * ORBIT_K;
  camPhi   -= dy * ORBIT_K;
  camPhi = Math.max(0.05, Math.min(Math.PI - 0.05, camPhi));
  updateCamera();

  e.preventDefault();
}

function onPointerUp() {
  isDragging = false;
  renderer.domElement.style.cursor = 'grab';
}

// Hover cursor hint — anywhere on canvas is grabbable
renderer.domElement.style.cursor = 'grab';

renderer.domElement.addEventListener('mousedown',  onPointerDown, { passive: false });
renderer.domElement.addEventListener('mousemove',  onPointerMove, { passive: false });
renderer.domElement.addEventListener('mouseup',    onPointerUp);
window.addEventListener('mouseup', onPointerUp); // catch release outside canvas
renderer.domElement.addEventListener('touchstart', onPointerDown, { passive: false });
renderer.domElement.addEventListener('touchmove',  onPointerMove, { passive: false });
renderer.domElement.addEventListener('touchend',   onPointerUp);

// ============================================================
// ZOOM — mousewheel and two-finger pinch dolly the camera radius along
// the orbit-sphere. Range: close enough to come right up to Earth's
// atmosphere (Earth radius 0.25 + atmosphere 0.03 + tiny gap = 0.4),
// far enough to see Saturn's orbit (~85 scene units from Earth at AU=8).
// ============================================================
const ZOOM_MIN = 0.4;
const ZOOM_MAX = 100;

function clampZoom(z) { return Math.max(ZOOM_MIN, Math.min(ZOOM_MAX, z)); }

renderer.domElement.addEventListener('wheel', (e) => {
  e.preventDefault();
  // deltaY > 0 = scroll-down = zoom out. Exponential step → uniform feel.
  const factor = Math.exp(e.deltaY * 0.001);
  camDistance = clampZoom(camDistance * factor);
  updateCamera();
}, { passive: false });

// Pinch-to-zoom on touch devices
let pinchStartDist = 0;
let pinchStartZ    = 0;

renderer.domElement.addEventListener('touchstart', (e) => {
  if (e.touches.length === 2) {
    // A second finger landed — abort any in-flight single-touch drag
    if (isDragging) {
      isDragging = false;
      renderer.domElement.style.cursor = 'grab';
    }
    const a = e.touches[0], b = e.touches[1];
    pinchStartDist = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    pinchStartZ = camDistance;
  }
}, { passive: true });

renderer.domElement.addEventListener('touchmove', (e) => {
  if (e.touches.length === 2 && pinchStartDist > 0) {
    e.preventDefault();
    const a = e.touches[0], b = e.touches[1];
    const d = Math.hypot(b.clientX - a.clientX, b.clientY - a.clientY);
    camDistance = clampZoom(pinchStartZ * (pinchStartDist / d));
    updateCamera();
  }
}, { passive: false });

renderer.domElement.addEventListener('touchend', () => { pinchStartDist = 0; });

// ============================================================
// ANIMATION LOOP
// ============================================================
const clock = new THREE.Clock();
let elapsedSim = 0; // simulated seconds

// Constants
const EARTH_ROT_SPEED = (2 * Math.PI) / (24 * 3600);   // rad/sim-second
const MOON_ORB_SPEED  = (2 * Math.PI) / (27.3 * 24 * 3600);
// planet speeds handled per-mesh via planetMeshes[].angSpeed

function animate() {
  requestAnimationFrame(animate);
  const dt    = clock.getDelta();
  const simDt = dt * TIME_RATE;
  elapsedSim += simDt;

  // Earth: natural daily rotation around the inertially-fixed spin axis
  // (EARTH_AXIS in world space). Always runs — drag now controls the
  // camera, never the Earth mesh, so the two no longer compete.
  const dEarth = simDt * EARTH_ROT_SPEED;
  if (earthMesh) earthMesh.rotateOnWorldAxis(EARTH_AXIS, dEarth);
  if (cloudMesh) cloudMesh.rotateOnWorldAxis(EARTH_AXIS, dEarth * 1.018);

  // Moon: natural orbit, no user input.
  moonOrbitY += simDt * MOON_ORB_SPEED;
  moonPivot.rotation.y = moonOrbitY;
  // Tidal lock — moon face always toward Earth
  if (moonMesh) moonMesh.rotation.y = -moonOrbitY;

  // Moon trail
  if (moonMesh) {
    const wp = new THREE.Vector3();
    moonMesh.getWorldPosition(wp);
    trailHistory.unshift(wp.clone());
    if (trailHistory.length > trailCount) trailHistory.pop();
    for (let i = 0; i < trailHistory.length; i++) {
      trailPositions[i*3]   = trailHistory[i].x;
      trailPositions[i*3+1] = trailHistory[i].y;
      trailPositions[i*3+2] = trailHistory[i].z;
    }
    trailGeo.attributes.position.needsUpdate = true;
    trailGeo.setDrawRange(0, trailHistory.length);
    trailLine.material.opacity = 0.12;
  }

  // Planets — circular orbits in eclipticGroup local frame. Every planet
  // shares SUN_LOCAL.y, so all orbits are strictly coplanar (textbook).
  planetMeshes.forEach((p) => {
    const angle = p.initAngle + elapsedSim * p.angSpeed;
    const lx = p.sunLocal.x + Math.cos(angle) * p.orbitR;
    const lz = p.sunLocal.z + Math.sin(angle) * p.orbitR;
    p.mesh.position.set(lx, p.sunLocal.y, lz);
    // Axial spin — scaled via elapsedSim (TIME_RATE)
    p.mesh.rotation.y = elapsedSim * p.rotSpeed * p.rotDir;
    // Saturn's ring follows the planet's position but keeps its fixed tilt
    if (p.ringMesh) {
      p.ringMesh.position.set(lx, p.sunLocal.y, lz);
    }
  });

  // Sun glow pulse — handled via sprite, no shader update needed

  // Cosmic events
  tickCosmicEvents(dt);

  // Star twinkle shader time update
  if (starPoints && starPoints.material.uniforms) {
    starPoints.material.uniforms.time.value += dt;
  }

  // Celestial sphere rotates with Earth's orbital position around the Sun
  // 1 full rotation per year (365.25 days) — stars drift as Earth revolves.
  // Initial offset chosen so the galactic-center bulge is visible at page load.
  const EARTH_ORB_SPEED = (2 * Math.PI) / (365.25 * 24 * 3600);
  const SKY_INITIAL_ROT = 0;
  celestialSphere.rotation.y = SKY_INITIAL_ROT + elapsedSim * EARTH_ORB_SPEED;

  renderer.render(scene, camera);
}

animate();
</script>
